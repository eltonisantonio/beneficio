/* ===========================================================================
   base.css — design tokens compartilhados (Funcionário + RH)
   Identidade Raguife: verde profundo + acento oliva, tipografia Bricolage/Inter.
   =========================================================================== */
:root{
  --bg:#eef5ec; --surface:#fff; --ink:#14241a; --muted:#647267; --line:#dce7db;
  --primary:#024f2b; --primary2:#0a6b3c; --soft:#e4f1e8;
  --accent:#739630; --accentSoft:#eef4e1;
  --bad:#c23a45; --badSoft:#fbeaeb; --warn:#b06b00; --warnSoft:#fff3d8;
  --ok:#1f7a4d; --okSoft:#e4f1e8;
  --shadow:0 12px 34px rgba(2,79,43,.10);
  --radius:16px;
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:Inter,system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased}

/* Toast — usado nas duas áreas */
.toast{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);
  background:#14241a;color:#fff;border-radius:999px;padding:11px 15px;
  font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:.2s;z-index:60;
  box-shadow:0 10px 30px rgba(0,0,0,.25)
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important}
}

/* === Carteirinha do funcionário (cinema) === */
.idcta{display:flex;align-items:center;gap:13px;width:100%;text-align:left;cursor:pointer;
  background:linear-gradient(100deg,#ffffff,#f3f8ef);border:1px solid var(--line);
  border-radius:16px;padding:14px 15px;margin-bottom:16px;box-shadow:var(--shadow)}
.idcta:active{transform:scale(.99)}
.idcta-ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:24px;
  background:var(--accentSoft);border:1px solid #e0ebcf;flex:none}
.idcta-tx{flex:1;min-width:0}
.idcta-tx b{display:block;font-size:15px;color:var(--ink);font-family:var(--display)}
.idcta-tx span{font-size:12.5px;color:var(--muted)}
.idcta-go{color:var(--accent);font-size:20px;font-weight:800;flex:none}

.idcard{position:relative;overflow:hidden;border-radius:22px;padding:20px 20px 16px;
  color:#fff;background:linear-gradient(150deg,#035e34 0%,#024f2b 48%,#01371f 100%);
  box-shadow:0 18px 40px rgba(2,79,43,.32);min-height:228px;display:flex;flex-direction:column;
  margin:6px 0 12px}
.idcard-shine{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 80% at 110% -10%, rgba(115,150,48,.45), transparent 55%),
             linear-gradient(115deg, rgba(255,255,255,.12), transparent 40%)}
.idcard-watermark{position:absolute;right:-26px;bottom:-30px;width:200px;opacity:.07;pointer-events:none;filter:none}
.idcard>*{position:relative;z-index:1}
.idcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:auto}
.idcard-logo{width:118px;height:auto}
.idcard-kind{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
  background:rgba(115,150,48,.9);color:#fff;padding:5px 10px;border-radius:999px}
.idcard-body{margin:18px 0 16px}
.idcard-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;
  color:rgba(255,255,255,.6);margin-bottom:3px}
.idcard-name{font-family:var(--display);font-size:25px;font-weight:800;line-height:1.1;
  letter-spacing:-.01em;word-break:break-word}
.idcard-grid{display:flex;gap:26px;margin-top:14px;flex-wrap:wrap}
.idcard-val{font-size:14px;font-weight:700;letter-spacing:.04em}
.idcard-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding-top:13px;border-top:1px solid rgba(255,255,255,.18)}
.idcard-benefit{font-size:13px;font-weight:800}
.idcard-stamp{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.05em}
.idcard-hint{text-align:center;font-size:12.5px;color:var(--muted);margin:0 6px 8px;line-height:1.5}

/* Banner (imagem do Canva) no detalhe do benefício */
.benefit-banner{display:block;width:100%;height:auto;border-radius:14px;margin:0 0 14px;border:1px solid var(--line)}

/* === Filtro de categorias (funcionário) === */
.catbar{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px;margin:0 0 12px;-webkit-overflow-scrolling:touch}
.catbar::-webkit-scrollbar{height:0}
.catchip{flex:none;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;
  padding:7px 14px;font:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.catchip.on{background:var(--primary);color:#fff;border-color:var(--primary)}

/* === Ajuste para app instalado (PWA) e telas estreitas === */
@media (max-width:480px){
  .app{margin:0 auto;min-height:100vh;border-radius:0}
  .head{border-radius:0 0 26px 26px}
}
/* respeita a área segura de baixo (barra de gestos do iPhone) */
.body{padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px))}
.login{padding-top:calc(env(safe-area-inset-top,0px) + 16px);padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px)}

/* === Selos Novo/Destaque + ênfase do card === */
.badge.new{background:var(--accentSoft);color:#4d6a13}
.badge.hot{background:#fff3d8;color:#b06b00}
.card.benefit.featured{box-shadow:0 1px 0 rgba(2,79,43,.04),0 14px 30px rgba(2,79,43,.10);
  outline:2px solid var(--accent);outline-offset:0}

/* === Pop-up de comunicado === */
.comm-overlay{position:fixed;inset:0;z-index:80;background:rgba(8,20,12,.62);display:flex;
  align-items:center;justify-content:center;padding:20px;
  padding-top:calc(env(safe-area-inset-top,0px) + 20px);padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px)}
.comm-box{position:relative;width:min(440px,100%);max-height:100%;display:flex;flex-direction:column;align-items:center;gap:14px}
.comm-box img{width:100%;max-height:78vh;object-fit:contain;border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.4);background:#fff}
.comm-close{position:absolute;top:-12px;right:-6px;width:36px;height:36px;border-radius:50%;border:0;
  background:#fff;color:var(--ink);font-size:22px;line-height:1;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.3)}
.comm-ok{border:0;background:#fff;color:var(--primary);font:inherit;font-weight:800;
  border-radius:999px;padding:12px 28px;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.25)}

// ============================================================================
// helpers.js — utilitários puros, sem dependência de Firebase.
// Compartilhado entre Funcionário e RH.
// ============================================================================

// --- Identificadores e escape de HTML ---------------------------------------
function id() {
  return Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
}
function esc(v) {
  return String(v ?? '').replace(/[&<>"]/g, s => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s]
  ));
}
function escAttr(v) {
  return esc(v).replace(/'/g, '&#39;');
}

// Versão "limpa" para prévias curtas: remove a marcação (** * _) e junta linhas.
function previewText(v) {
  return String(v || '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/(^|[\s(])\*([^*\n]+)\*/g, '$1$2')
    .replace(/(^|[\s(])_([^_\n]+)_/g, '$1$2')
    .replace(/\s+/g, ' ')
    .trim();
}

// Formata texto simples: **negrito**, *itálico* (ou _itálico_) e quebras de linha.
// Escapa o HTML primeiro (seguro), depois aplica a marcação leve.
function formatText(v) {
  let s = esc(v);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>'); // **negrito**
  s = s.replace(/(^|[\s(])\*([^*\n]+)\*/g, '$1<em>$2</em>'); // *itálico*
  s = s.replace(/(^|[\s(])_([^_\n]+)_/g, '$1<em>$2</em>');   // _itálico_
  s = s.replace(/\n/g, '<br>');                               // quebras de linha
  return s;
}

// --- CPF ---------------------------------------------------------------------
// digits: extrai só os números. normalizeCpf: 11 dígitos com zeros à esquerda.
function digits(v) { return String(v ?? '').replace(/\D/g, ''); }
function normalizeCpf(v) { return digits(v).padStart(11, '0').slice(-11); }

// Máscara COMPLETA (uso interno/admin): 000.000.000-00
function cpfMaskFull(v) {
  return normalizeCpf(v).replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}
// Máscara SEGURA (exibida ao funcionário e no admin): ***.456.789-**
function cpfSafe(v) {
  const d = normalizeCpf(v);
  return '***.' + d.slice(3, 6) + '.' + d.slice(6, 9) + '-**';
}
function isValidCpfLength(v) { return digits(v).length === 11; }

// Hash SHA-256 do CPF normalizado → usado como ID do documento do funcionário.
// O CPF aberto NUNCA é gravado no banco; guardamos apenas o hash + a máscara.
async function cpfHash(v) {
  const norm = normalizeCpf(v);
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('rgf:' + norm));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

// --- Nomes -------------------------------------------------------------------
function firstName(n) {
  return String(n || '').trim().split(/\s+/)[0] || 'Colaborador';
}

// --- Datas -------------------------------------------------------------------
function nowLocalForInput() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}
function dt(v) {
  if (!v) return '';
  try { return new Date(v).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }); }
  catch { return String(v); }
}
function dateShort(v) {
  if (!v) return '';
  try { return new Date(v).toLocaleDateString('pt-BR'); } catch { return String(v); }
}
// Verifica se a data atual está dentro do intervalo [from, to] (ambos opcionais).
function dateOk(from, to) {
  const n = Date.now();
  if (from && new Date(from).getTime() > n) return false;
  if (to && new Date(to).getTime() < n) return false;
  return true;
}

// --- Voucher -----------------------------------------------------------------
function voucherCode() {
  const s = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out = '';
  for (let i = 0; i < 8; i++) out += s[Math.floor(Math.random() * s.length)];
  return out.slice(0, 4) + '-' + out.slice(4);
}

// --- Toast (notificação rápida) ----------------------------------------------
function toast(msg) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// --- Leitura de arquivo como Data URL (para logos/ícones em Base64) ----------
function readFileDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

// Mapeia o texto da coluna "Perfil" da planilha para ids de perfis cadastrados.
function resolveProfileIds(profileText, profiles) {
  const raw = String(profileText || '').trim().toLowerCase();
  if (!raw) return [];
  // 1) tenta casar o TEXTO INTEIRO com um perfil (cobre "Estagiário/Aprendiz")
  const full = profiles.find(p => String(p.name).trim().toLowerCase() === raw);
  if (full) return [full.id];
  // 2) senão, divide por separadores e casa cada parte
  const names = raw.split(/[;,|/]/).map(x => x.trim()).filter(Boolean);
  return profiles
    .filter(p => names.includes(String(p.name).trim().toLowerCase()))
    .map(p => p.id);
}

// IMPORTAÇÃO: a nova planilha SUBSTITUI completamente a base anterior.
// rows: [{ name, cpf, profile, unit?, department?, role?, ... }]
// Retorna o resumo (totais) para exibir e gravar no histórico.
async function importEmployees(rows, meta = {}) {
  const profiles = await listProfiles();
  const existing = await listEmployees();
  const existingIds = new Set(existing.map(e => e.id));

  // Monta os novos documentos.
  const newDocs = [];
  const newIds = new Set();
  const totalsByProfile = {};
  let withoutProfile = 0;

  for (const r of rows) {
    const cpf = normalizeCpf(r.cpf);
    if (cpf.length !== 11) continue;
    const h = await cpfHash(cpf);
    if (newIds.has(h)) continue; // evita CPF duplicado na própria planilha
    newIds.add(h);

    const profileIds = resolveProfileIds(r.profile, profiles);
    if (!profileIds.length) withoutProfile++;
    profileIds.forEach(pid => { totalsByProfile[pid] = (totalsByProfile[pid] || 0) + 1; });

    newDocs.push({
      id: h,
      data: {
        name: String(r.name || '').trim(),
        firstName: firstName(r.name),
        cpfMasked: cpfSafe(cpf),
        profileIds,
        profileRaw: String(r.profile || '').trim(),
        unit: String(r.unit || '').trim(),
        department: String(r.department || '').trim(),
        role: String(r.role || '').trim(),
        situation: String(r.situation || '').trim(),
        admissionDate: String(r.admissionDate || '').trim(),
        registry: String(r.registry || '').trim(),
        wonFilms: [],          // títulos de filmes já ganhos (trava do sorteio)
        status: 'active',
        importId: meta.importId || '',
        updatedAt: Date.now()
      }
    });
  }

  // IDs a remover = existentes que não estão na nova planilha.
  const toRemove = [...existingIds].filter(x => !newIds.has(x));

  // Executa em lotes (limite do Firestore: 500 operações por batch).
  const ops = [];
  toRemove.forEach(rid => ops.push({ type: 'del', id: rid }));
  newDocs.forEach(nd => ops.push({ type: 'set', id: nd.id, data: nd.data }));

  for (let i = 0; i < ops.length; i += 450) {
    const batch = writeBatch(db);
    for (const op of ops.slice(i, i + 450)) {
      if (op.type === 'del') batch.delete(ref('employees', op.id));
      else batch.set(ref('employees', op.id), op.data);
    }
    await batch.commit();
  }

  const summary = {
    fileName: meta.fileName || '',
    totalEmployees: newDocs.length,
    totalAdded: newDocs.filter(nd => !existingIds.has(nd.id)).length,
    totalRemoved: toRemove.length,
    totalsByProfile,
    withoutProfile,
    createdAt: Date.now(),
    createdBy: meta.userEmail || ''
  };
  return summary;
}

// MOTOR DO SORTEIO (somente RH).
// Regras aplicadas:
//   - só concorre quem se inscreveu (clicou "Quero participar");
//   - ninguém ganha o mesmo TÍTULO de filme que já ganhou (agora ou no histórico);
//   - cada pessoa ganha no máximo 1 prêmio por sorteio.
async function drawRaffle(raffleId) {
  const raffle = await getRaffle(raffleId);
  if (!raffle) throw new Error('Sorteio não encontrado.');
  if (!raffle.films || !raffle.films.length) throw new Error('Cadastre ao menos um filme.');

  const entries = await listEntries(raffleId);
  const history = await listAllWinners();

  // Conjunto "cpfHash::tituloMinusculo" de filmes já ganhos no histórico.
  const wonBefore = new Set(
    history.map(w => `${w.cpfHash}::${String(w.filmTitle || '').trim().toLowerCase()}`)
  );

  const selectedThisRaffle = new Set(); // ninguém ganha 2x no mesmo sorteio
  const winners = [];

  for (const film of raffle.films) {
    if (film.active === false) continue;
    const titleKey = String(film.title || '').trim().toLowerCase();
    let pool = entries.filter(e =>
      e.filmId === film.id &&
      !selectedThisRaffle.has(e.cpfHash) &&
      !wonBefore.has(`${e.cpfHash}::${titleKey}`)
    );
    // Embaralha (Fisher–Yates) e escolhe a quantidade de ingressos.
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const picked = pool.slice(0, Math.max(0, Number(film.quantity || 0)));
    for (const e of picked) {
      selectedThisRaffle.add(e.cpfHash);
      winners.push({
        raffleId,
        filmId: film.id,
        filmTitle: film.title,
        cpfHash: e.cpfHash,
        employeeName: e.employeeName || '',
        voucherCode: voucherCode(),
        createdAt: Date.now()
      });
    }
  }

  // Grava ganhadores + atualiza wonFilms no doc do funcionário (em lotes).
  for (let i = 0; i < winners.length; i += 200) {
    const batch = writeBatch(db);
    for (const w of winners.slice(i, i + 200)) {
      batch.set(ref('raffle_winners', winnerKey(raffleId, w.cpfHash)), w);
      batch.update(ref('employees', w.cpfHash), {
        wonFilms: arrayUnionTitle(w.filmTitle)
      });
    }
    await batch.commit();
  }

  await updateDoc(ref('raffles', raffleId), {
    status: 'drawn', drawAt: Date.now(), updatedAt: Date.now()
  });
  return winners;
}

// employee.js — Área do Funcionário (mobile-first).
// Fluxo: login por CPF → home (benefícios + sorteio) → detalhe do benefício.
// Não há senha individual; o login é só identificação. Guardamos no dispositivo
// apenas o HASH do CPF (nunca o CPF aberto) para reabrir a sessão.
// ============================================================================





const HKEY = 'rgf_h'; // chave do hash no localStorage

// --- Estado da aplicação -----------------------------------------------------
const S = {
  settings: null, profiles: [], benefits: [],
  employee: null, raffle: null, myEntries: [], myWinner: null, comm: null,
  screen: 'home', openBenefitId: null, search: '', category: ''
};

const root = () => document.getElementById('root');

// --- Inicialização -----------------------------------------------------------
async function init() {
  try {
    S.settings = await getSettings();
    document.title = `${S.settings.companyName} · ${S.settings.portalName}`;
    const savedHash = localStorage.getItem(HKEY);
    if (savedHash) {
      S.employee = await getEmployeeByHash(savedHash);
      if (S.employee) await afterLogin();
      else localStorage.removeItem(HKEY);
    }
    render();
    if (S.employee) maybeShowComm();
  } catch (e) {
    root().innerHTML = errorView(e);
  }
}

async function afterLogin() {
  localStorage.setItem(HKEY, S.employee.id);
  S.profiles = await listProfiles();
  S.benefits = await listBenefits();
  S.comm = await getCommunication().catch(() => null);
  S.raffle = await getCurrentRaffle();
  if (S.raffle) {
    S.myEntries = await getMyEntries(S.raffle, S.employee.id);
    S.myWinner = await getMyWinner(S.raffle.id, S.employee.id);
  } else {
    S.myEntries = []; S.myWinner = null;
  }
}

// --- Ações -------------------------------------------------------------------
async function login() {
  const input = document.getElementById('cpf');
  const err = document.getElementById('loginErr');
  const value = input.value;
  if (!isValidCpfLength(value)) {
    err.style.display = 'block';
    err.textContent = 'Digite um CPF válido com 11 números.';
    return;
  }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Entrando…';
  const emp = await getEmployeeByCpf(value);
  if (!emp) {
    err.style.display = 'block';
    err.textContent = 'CPF não encontrado na base ativa. Procure o RH/DP.';
    btn.disabled = false; btn.textContent = 'Entrar';
    return;
  }
  S.employee = emp;
  await afterLogin();
  S.screen = 'home';
  render();
  maybeShowComm();
}

function logout() {
  localStorage.removeItem(HKEY);
  S.employee = null; S.raffle = null; S.myEntries = []; S.myWinner = null;
  S.screen = 'home'; S.openBenefitId = null; S.search = ''; S.category = '';
  render();
}

function setSearch(v) { S.search = v; renderCards(); }
function setCategory(c) { S.category = c; renderCatbar(); renderCards(); }
function openBenefit(bid) { S.openBenefitId = bid; S.screen = 'detail'; render(); window.scrollTo(0, 0); }
function goHome() { S.screen = 'home'; S.openBenefitId = null; render(); window.scrollTo(0, 0); }

async function joinRaffle() {
  if (!S.raffle) return;
  const checked = [...document.querySelectorAll('input[name="film"]:checked')].map(el => el.value);
  if (!checked.length) { toast('Marque ao menos um filme.'); return; }
  const enteredIds = new Set(S.myEntries.map(e => e.filmId));
  const wonSet = new Set((S.employee.wonFilms || []).map(t => String(t).trim().toLowerCase()));
  const toEnter = checked
    .filter(id => !enteredIds.has(id))
    .map(id => S.raffle.films.find(f => f.id === id))
    .filter(f => f && !wonSet.has(String(f.title).trim().toLowerCase()));
  if (!toEnter.length) { toast('Você já está inscrito nesses filmes.'); return; }
  try {
    for (const film of toEnter) await createEntry(S.raffle, film, S.employee);
    S.myEntries = await getMyEntries(S.raffle, S.employee.id);
    toast(toEnter.length > 1 ? `Inscrição registrada em ${toEnter.length} filmes!` : 'Inscrição registrada!');
    render();
  } catch (e) {
    toast('Não foi possível registrar. Tente novamente.');
  }
}

// --- Lógica de exibição de benefícios ---------------------------------------
function employeeProfileNames() {
  return (S.employee.profileIds || [])
    .map(pid => S.profiles.find(p => p.id === pid)?.name)
    .filter(Boolean);
}
function benefitVisible(b) {
  if (b.active === false) return false;
  if (!dateOk(b.startDate, b.endDate)) return false;
  if (!b.profileIds || !b.profileIds.length) return true; // sem restrição = todos
  return b.profileIds.some(pid => (S.employee.profileIds || []).includes(pid));
}
function myBenefits() {
  return S.benefits.filter(benefitVisible);
}
function categories() {
  return [...new Set(myBenefits().map(b => b.category).filter(Boolean))]
    .sort((a, b) => a.localeCompare(b));
}
function filteredBenefits() {
  const q = S.search.toLowerCase().trim();
  const cat = S.category;
  return myBenefits().filter(b =>
    (!cat || b.category === cat) &&
    (!q || [b.name, b.category, b.description, b.responsible].join(' ').toLowerCase().includes(q)));
}

// --- Render ------------------------------------------------------------------
function render() {
  if (!S.employee) {
    root().innerHTML = loginView();
    setTimeout(() => document.getElementById('cpf')?.focus(), 20);
    return;
  }
  const view = S.screen === 'detail' ? detailView() : S.screen === 'card' ? cardView() : homeView();
  root().innerHTML = shell(view);
}
function renderHomeBody() {
  const el = document.querySelector('.body');
  if (el && S.screen === 'home') el.innerHTML = homeBody();
}
function cardsHTML() {
  const benefits = filteredBenefits()
    .slice()
    .sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));
  return benefits.length
    ? benefits.map(benefitCard).join('')
    : '<div class="empty">Nenhum benefício encontrado para este filtro.</div>';
}
function catbarHTML() {
  const cats = categories();
  if (cats.length < 2) return '';
  const chip = (val, label) =>
    `<button class="catchip ${S.category === val ? 'on' : ''}" onclick="window.__setCategory('${escAttr(val)}')">${esc(label)}</button>`;
  return chip('', 'Todos') + cats.map(c => chip(c, c)).join('');
}
function renderCards() {
  const el = document.getElementById('cards');
  if (el) el.innerHTML = cardsHTML();
}
function renderCatbar() {
  const el = document.getElementById('catbar');
  if (el) el.innerHTML = catbarHTML();
}

function iconHTML(b, cls = 'ico') {
  const fit = b.iconFit === 'cover' ? 'cover' : 'contain';
  const bg = CARD_COLORS[(b.color || 0) % CARD_COLORS.length];
  const inner = b.iconBase64
    ? `<img src="${escAttr(b.iconBase64)}" alt="" />`
    : esc(b.icon || '💸');
  return `<div class="${cls} ${fit}" style="background:${bg}">${inner}</div>`;
}

function loginView() {
  return `<main class="login"><section class="login-card">
    <img id="loginLogo" src="${escAttr(LOGO)}" alt="${escAttr(S.settings.companyName)}">
    <h1>${esc(S.settings.portalName)}</h1>
    <p>Entre com seu CPF para ver seus benefícios e participar do sorteio do cinema.</p>
    <input class="field" id="cpf" inputmode="numeric" maxlength="14"
      placeholder="000.000.000-00" autocomplete="off"
      oninput="this.value=this.value.replace(/[^0-9.\\-]/g,'')"
      onkeydown="if(event.key==='Enter')window.__login()">
    <button class="btn" id="loginBtn" onclick="window.__login()">Entrar</button>
    <div id="loginErr" class="error"></div>
    <div class="privacy">${esc(S.settings.privacyText)}</div>
  </section></main>`;
}

function shell(content) {
  const names = employeeProfileNames().join(', ') || 'Perfil não informado';
  return `<div class="app">
    <header class="head">
      <div class="brand">
        <img src="${escAttr(LOGO_WHITE)}" alt="${escAttr(S.settings.companyName)}">
        <div><b>${esc(S.settings.portalName)}</b><span>Consulta do colaborador</span></div>
      </div>
      <div class="hello">
        <div>
          <h1>Olá, ${esc(firstName(S.employee.name))}</h1>
          <p>CPF ${esc(S.employee.cpfMasked || cpfSafe('0'))} · ${esc(names)}</p>
        </div>
        <button class="logout" onclick="window.__logout()">Sair</button>
      </div>
    </header>
    <main class="body">${content}</main>
  </div>`;
}

function homeView() { return homeBody(); }
function homeBody() {
  const total = myBenefits().length;
  return `${raffleCard()}
    ${cardAllowed() ? `<button class="idcta" onclick="window.__openCard()">
      <div class="idcta-ic">🎟️</div>
      <div class="idcta-tx"><b>Carteirinha do funcionário</b><span>Meia-entrada no cinema · toque para abrir</span></div>
      <div class="idcta-go">→</div>
    </button>` : ''}
    <div class="status">
      <div class="stat"><b>${total}</b><span>benefícios disponíveis</span></div>
      <div class="stat"><b>${S.raffle && S.raffle.status !== 'draft' ? '1' : '0'}</b><span>sorteio na semana</span></div>
    </div>
    <div class="section-title"><h2>Benefícios</h2><span class="pill">Seu perfil</span></div>
    <div class="search"><span>🔎</span>
      <input class="field" value="${escAttr(S.search)}" placeholder="Buscar benefício"
        oninput="window.__setSearch(this.value)"></div>
    <div class="catbar" id="catbar">${catbarHTML()}</div>
    <div class="cards" id="cards">${cardsHTML()}</div>
    <div class="privacy">${esc(S.settings.privacyText)}</div>`;
}

function benefitCard(b) {
  const badges = [];
  if (b.isNew) badges.push('<span class="badge new">Novo</span>');
  if (b.featured) badges.push('<span class="badge hot">★ Destaque</span>');
  if (b.actionRequired) badges.push('<span class="badge warn">Ação necessária</span>');
  if (b.endDate) badges.push(`<span class="badge">Até ${esc(dateShort(b.endDate))}</span>`);
  const desc = previewText(b.description || '');
  return `<button class="card benefit${b.featured ? ' featured' : ''}" onclick="window.__openBenefit('${b.id}')">
    <div class="brow">${iconHTML(b)}
      <div class="btitle"><h3>${esc(b.name)}</h3><span>${esc(b.category)}</span></div></div>
    ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
    <p>${esc(desc.slice(0, 120))}${desc.length > 120 ? '…' : ''}</p>
    <div class="go">→</div></button>`;
}

function detailView() {
  const b = S.benefits.find(x => x.id === S.openBenefitId);
  if (!b) return homeBody();
  const bg = CARD_COLORS[(b.color || 0) % CARD_COLORS.length];
  const links = [...(b.links || []), ...(b.documents || [])];
  return `<button class="back" onclick="window.__goHome()">← Voltar</button>
    <section class="detail-head" style="background:${bg}">
      ${iconHTML(b)}<span>${esc(b.category)}</span><h2>${esc(b.name)}</h2></section>
    ${b.bannerBase64 ? `<img class="benefit-banner" src="${escAttr(b.bannerBase64)}" alt="">` : ''}
    <section class="box"><div class="lbl">Resumo</div>
      <p>${formatText(b.description || 'Sem descrição cadastrada.')}</p></section>
    ${b.details ? `<section class="box"><div class="lbl">Regras</div><p>${formatText(b.details)}</p></section>` : ''}
    ${b.responsible ? `<section class="box"><div class="lbl">Dúvidas com</div><p>${esc(b.responsible)}</p></section>` : ''}
    ${links.length ? `<section class="box"><div class="lbl">Links e documentos</div>
      ${links.map(l => `<a class="link" href="${escAttr(l.url)}" target="_blank" rel="noopener">
        <span>${linkIcon(l.url)}</span><span>${esc(l.label || 'Acessar')}</span><small>↗</small></a>`).join('')}
      </section>` : ''}`;
}
function cardAllowed() {
  if (!S.settings || S.settings.cardEnabled === false) return false;
  const ids = S.settings.cardProfileIds || [];
  if (!ids.length) return true; // vazio = todos os perfis
  return (S.employee.profileIds || []).some(pid => ids.includes(pid));
}
function openCard() {
  if (!cardAllowed()) { toast('Carteirinha indisponível para o seu perfil.'); return; }
  S.screen = 'card'; render(); window.scrollTo(0, 0);
}
function monthYear() {
  const s = new Date().toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function cardView() {
  const e = S.employee;
  const names = employeeProfileNames().join(', ');
  return `<button class="back" onclick="window.__goHome()">← Voltar</button>
    <div class="idcard">
      <div class="idcard-shine"></div>
      <img class="idcard-watermark" src="${escAttr(LOGO_WHITE)}" alt="">
      <div class="idcard-top">
        <img class="idcard-logo" src="${escAttr(LOGO_WHITE)}" alt="Raguife">
        <span class="idcard-kind">Funcionário(a)</span>
      </div>
      <div class="idcard-body">
        <div class="idcard-label">Nome</div>
        <div class="idcard-name">${esc(e.name || '—')}</div>
        <div class="idcard-grid">
          <div><div class="idcard-label">CPF</div>
            <div class="idcard-val">${esc(e.cpfMasked || cpfSafe('0'))}</div></div>
          ${names ? `<div><div class="idcard-label">Perfil</div>
            <div class="idcard-val">${esc(names)}</div></div>` : ''}
        </div>
      </div>
      <div class="idcard-foot">
        <span class="idcard-benefit">Meia-entrada no cinema</span>
        <span class="idcard-stamp">${esc(monthYear())}</span>
      </div>
    </div>
    <p class="idcard-hint">Apresente esta tela no guichê do cinema para garantir a meia-entrada.</p>`;
}

function linkIcon(url) {
  const u = String(url || '').toLowerCase();
  if (u.includes('pdf')) return '📄';
  if (u.includes('wa.me') || u.includes('whatsapp')) return '💬';
  if (u.includes('youtube')) return '▶️';
  return '🔗';
}

// --- Card do sorteio ---------------------------------------------------------
function raffleOpen(r) {
  return r && r.status === 'open' && dateOk(r.startAt, r.endAt);
}
function raffleCard() {
  const r = S.raffle;
  if (!r || r.status === 'draft') return '';
  const title = esc(r.title || 'Sorteio do Cinema');

  // Resultado publicado
  if (r.status === 'published') {
    if (S.myWinner) {
      return `<section class="raffle"><h2>${title}</h2><p>Resultado publicado.</p>
        <div class="result win">🎉 Você foi contemplado: ${esc(S.myWinner.filmTitle)}</div>
        <div class="voucher"><div class="stub"><span>CINEMA</span></div>
          <div class="vbody"><b>${esc(S.myWinner.filmTitle)}</b><br>
            <span>Código: <code>${esc(S.myWinner.voucherCode)}</code></span><br>
            <small>Apresente este voucher conforme orientação do RH/DP.</small></div></div></section>`;
    }
    return `<section class="raffle"><h2>${title}</h2><p>Resultado publicado.</p>
      <div class="result">Dessa vez você não foi contemplado. Boa sorte na próxima!</div></section>`;
  }

  const enteredIds = new Set(S.myEntries.map(e => e.filmId));
  const enteredTitles = S.myEntries.map(e => e.filmTitle).filter(Boolean);

  // Inscrições fechadas / sorteado (ainda não publicado)
  if (!raffleOpen(r)) {
    if (enteredIds.size) {
      return `<section class="raffle"><h2>${title}</h2>
        <p>Inscrições encerradas. Você está concorrendo — aguarde o resultado.</p>
        <div class="result win">✅ Inscrito em: ${esc(enteredTitles.join(', '))}</div></section>`;
    }
    return `<section class="raffle"><h2>${title}</h2>
      <p>As inscrições não estão abertas neste momento.</p>
      <div class="result">Período: ${r.startAt ? esc(dt(r.startAt)) : 'a definir'} até ${r.endAt ? esc(dt(r.endAt)) : 'a definir'}</div></section>`;
  }

  // Inscrições abertas — marcar um ou vários filmes
  const films = (r.films || []).filter(f => f.active !== false);
  const wonSet = new Set((S.employee.wonFilms || []).map(t => String(t).trim().toLowerCase()));
  const canPick = films.filter(f => !enteredIds.has(f.id) && !wonSet.has(String(f.title).trim().toLowerCase()));
  const intro = enteredIds.size
    ? 'Você já está inscrito nos filmes marcados. Pode marcar mais e confirmar.'
    : 'Marque um ou mais filmes e confirme. Você concorre em todos, mas leva no máximo um prêmio.';
  return `<section class="raffle"><h2>${title}</h2>
    <p>${intro}</p>
    ${films.map(f => {
      const entered = enteredIds.has(f.id);
      const won = wonSet.has(String(f.title).trim().toLowerCase());
      const disabled = entered || won;
      const note = won ? 'Você já ganhou este filme' : entered ? 'Inscrito ✓' : `${Number(f.quantity || 0)} ingresso(s)`;
      return `<label class="film" ${won ? 'style="opacity:.5"' : ''}>
        <input type="checkbox" name="film" value="${escAttr(f.id)}" ${entered ? 'checked' : ''} ${disabled ? 'disabled' : ''}>
        <div><b>${esc(f.title)}</b><span>${note}</span></div></label>`;
    }).join('')}
    ${canPick.length
      ? `<button class="btn" onclick="window.__joinRaffle()">${enteredIds.size ? 'Confirmar inscrições' : 'Quero participar'}</button>`
      : '<div class="result win">✅ Você está inscrito em todos os filmes disponíveis.</div>'}
  </section>`;
}

function errorView(e) {
  const msg = String(e && e.message ? e.message : e).slice(0, 200);
  return `<main class="login"><section class="login-card">
    <h1>Não foi possível carregar</h1>
    <p>Verifique sua conexão e tente novamente. Se persistir, procure o RH/DP.</p>
    <p style="font-size:12px;color:var(--bad);margin-top:8px">Detalhe: ${esc(msg)}</p>
  </section></main>`;
}

// Mostra o comunicado (arte) uma única vez por versão, neste dispositivo.
function maybeShowComm() {
  const c = S.comm;
  if (!c || !c.active || !c.imageBase64 || !c.id) return;
  if (localStorage.getItem('rgf_comm_seen') === c.id) return;
  const wrap = document.createElement('div');
  wrap.className = 'comm-overlay';
  wrap.innerHTML = `<div class="comm-box">
    <button class="comm-close" aria-label="Fechar">×</button>
    <img src="${escAttr(c.imageBase64)}" alt="Comunicado">
    <button class="comm-ok">Entendi</button>
  </div>`;
  const close = () => { try { localStorage.setItem('rgf_comm_seen', c.id); } catch (e) {} wrap.remove(); };
  wrap.addEventListener('click', e => { if (e.target === wrap) close(); });
  wrap.querySelector('.comm-close').onclick = close;
  wrap.querySelector('.comm-ok').onclick = close;
  document.body.appendChild(wrap);
}

// --- Expõe handlers para os onclick inline -----------------------------------
window.__login = login;
window.__logout = logout;
window.__setSearch = setSearch;
window.__setCategory = setCategory;
window.__openBenefit = openBenefit;
window.__openCard = openCard;
window.__goHome = goHome;
window.__joinRaffle = joinRaffle;

init();

</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("./service-worker.js").catch(function(){})})}</script>
</body></html>
