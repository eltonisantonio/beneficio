<script>
(function(){
  let _resolve; window.__storageReady=new Promise(function(r){_resolve=r;});
  let _set=false;
  window.__setStorage=function(impl){ if(_set) return; _set=true; window.storage=impl; _resolve(impl); };
  if(window.storage && typeof window.storage.get==='function'){ window.__setStorage(window.storage); }
})();
</script>

<!-- ===== Firebase (ativo no GitHub Pages). Cole a config do seu projeto abaixo. ===== -->
<script type="module">
  const firebaseConfig = {
    apiKey: "COLE_AQUI",
    authDomain: "COLE_AQUI.firebaseapp.com",
    projectId: "COLE_AQUI",
    storageBucket: "COLE_AQUI.appspot.com",
    messagingSenderId: "COLE_AQUI",
    appId: "COLE_AQUI"
  };
  function localShim(){
    const P='rgf_';
    return {
      async get(k){ const v=localStorage.getItem(P+k); return v==null?null:{key:k,value:v}; },
      async set(k,v){ try{ localStorage.setItem(P+k,v); return {key:k,value:v}; }catch(e){ return null; } },
      async delete(k){ localStorage.removeItem(P+k); return {key:k,deleted:true}; },
      async list(prefix){ const out=[]; for(let i=0;i<localStorage.length;i++){ const kk=localStorage.key(i); if(kk&&kk.indexOf(P+(prefix||''))===0) out.push(kk.slice(P.length)); } return {keys:out}; }
    };
  }
  async function start(){
    if(window.storage && typeof window.storage.get==='function'){ window.__setStorage(window.storage); return; }
    const ok=firebaseConfig.apiKey && firebaseConfig.apiKey!=="COLE_AQUI";
    if(!ok){ window.__setStorage(localShim()); return; }
    try{
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
      const { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, where, getDocs } =
        await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      const app=initializeApp(firebaseConfig); const db=getFirestore(app); const COL='raguife';
      const enc=function(k){ return encodeURIComponent(k); };
      const fb={
        async get(k){ try{ const sn=await getDoc(doc(db,COL,enc(k))); return sn.exists()?{key:k,value:sn.data().v}:null; }catch(e){ console.error(e); return null; } },
        async set(k,v){ try{ await setDoc(doc(db,COL,enc(k)),{k:k,v:v,t:Date.now()}); return {key:k,value:v}; }catch(e){ console.error(e); return null; } },
        async delete(k){ try{ await deleteDoc(doc(db,COL,enc(k))); }catch(e){} return {key:k,deleted:true}; },
        async list(prefix){ try{ const qy=query(collection(db,COL),where('k','>=',prefix),where('k','<',prefix+'\uf8ff')); const sn=await getDocs(qy); const keys=[]; sn.forEach(function(d){ keys.push(d.data().k); }); return {keys:keys}; }catch(e){ console.error(e); return {keys:[]}; } }
      };
      window.__setStorage(fb);
    }catch(e){ console.error('Firebase indisponivel, modo local:',e); window.__setStorage(localShim()); }
  }
  start();
</script>

<style>
  :root{
    --bg:#F3F6F2;--surface:#FFFFFF;--ink:#16271C;--muted:#666666;--line:#E1E8E2;
    --primary:#024f2b;--primary-soft:#E6F0E8;--accent:#739630;--accent-soft:#EEF3E2;
    --good:#024f2b;--bad:#C23A45;--radius:18px;
    --shadow:0 1px 2px rgba(2,79,43,.05),0 8px 30px rgba(2,79,43,.07);
    --card1:#024f2b;--card2:#739630;--card3:#0a6b3c;--card4:#557024;--card5:#1f7a4d;--card6:#666666;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:1100px;margin:0 auto;padding:22px 18px 80px}
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;margin:0;letter-spacing:-.02em}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px}
  .brand{display:flex;align-items:center;gap:14px;flex:0 1 auto;min-width:0}
  .brand img{height:36px;width:auto;flex:0 0 auto;object-fit:contain;display:block}
  .brand .div{width:1px;height:30px;background:var(--line)}
  .brand .pname{font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;color:var(--primary);line-height:1}
  .brand .pname span{display:block;font-family:'Inter';font-weight:500;font-size:11px;color:var(--muted)}

  .switch{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px;box-shadow:var(--shadow)}
  .switch button{border:0;background:transparent;font:inherit;font-weight:600;color:var(--muted);padding:9px 16px;border-radius:999px;cursor:pointer;font-size:14px}
  .switch button.on{background:var(--primary);color:#fff}

  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tab{border:1px solid var(--line);background:var(--surface);font:inherit;font-weight:600;font-size:14px;color:var(--muted);padding:10px 16px;border-radius:999px;cursor:pointer}
  .tab.on{background:var(--primary-soft);color:var(--primary);border-color:transparent}

  .grid{display:grid;grid-template-columns:380px 1fr;gap:22px;align-items:start}
  @media(max-width:840px){.grid{grid-template-columns:1fr}}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
  .card h2{font-size:18px;margin-bottom:4px}
  .card .sub{color:var(--muted);font-size:13.5px;margin-bottom:18px}

  label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
  label:first-of-type{margin-top:0}
  input,textarea,select{width:100%;font:inherit;font-size:14.5px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);outline:none}
  input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  textarea{resize:vertical;min-height:74px}
  .hint{font-size:12px;color:var(--muted);margin-top:5px}

  .btn{border:0;font:inherit;font-weight:700;font-size:15px;padding:12px 18px;border-radius:12px;cursor:pointer;background:var(--primary);color:#fff;width:100%;margin-top:18px}
  .btn:hover{filter:brightness(1.12)}
  .btn.ghost{background:var(--primary-soft);color:var(--primary)}
  .btn.line{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn.sm{width:auto;padding:9px 14px;font-size:13px;margin:0}

  .empty{border:1.5px dashed var(--line);border-radius:var(--radius);padding:34px 20px;text-align:center;color:var(--muted);font-size:14px}
  .editbar{background:var(--accent-soft);border:1px solid var(--accent);border-radius:12px;padding:10px 14px;font-size:13px;font-weight:600;color:var(--primary);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .editbar button{border:0;background:#fff;border-radius:8px;padding:5px 10px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}

  .profchecks{display:flex;flex-direction:column;gap:7px;background:var(--bg);border-radius:12px;padding:12px 14px}
  .pcheck{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:500;margin:0;cursor:pointer}
  .pcheck input{width:auto;margin:0}

  .uploadbtn{display:inline-block;border:1px dashed var(--line);background:var(--accent-soft);color:var(--primary);font-weight:600;font-size:13px;border-radius:10px;padding:9px 12px;cursor:pointer;margin-top:6px}
  .iconprev{display:flex;align-items:center;gap:10px;margin-top:8px}
  .iconprev img{width:48px;height:48px;border-radius:12px;object-fit:cover;border:1px solid var(--line)}
  .iconprev button{border:0;background:var(--bg);border-radius:8px;padding:6px 10px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .thumb{position:relative;width:84px;height:84px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb button{position:absolute;top:3px;right:3px;border:0;background:rgba(0,0,0,.55);color:#fff;width:20px;height:20px;border-radius:50%;cursor:pointer;font-size:12px;line-height:1}

  .linkrows{display:flex;flex-direction:column;gap:8px}
  .linkrow{display:grid;grid-template-columns:120px 1fr 32px;gap:8px;align-items:center}
  .linkrow input{padding:9px 11px;font-size:13.5px}
  .linkrow .rm{border:1px solid var(--line);background:#fff;border-radius:9px;height:38px;cursor:pointer;color:var(--muted);font-size:16px}
  .linkrow .rm:hover{color:var(--bad);border-color:var(--bad)}
  .addlink{border:1px dashed var(--line);background:var(--accent-soft);color:var(--primary);font:inherit;font-weight:600;font-size:13px;border-radius:10px;padding:9px;cursor:pointer;margin-top:8px;width:100%}

  .blist{display:grid;gap:12px}
  .bitem{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start}
  .bitem.feat{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
  .bdot{width:42px;height:42px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;font-size:22px;color:#fff;overflow:hidden}
  .bdot img{width:42px;height:42px;object-fit:cover;display:block}
  .bitem .bbody{flex:1;min-width:0}
  .bitem h3{font-size:15.5px;margin-bottom:2px}
  .tagrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
  .cat{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:6px}
  .tag-new{background:var(--accent);color:#fff}.tag-feat{background:var(--primary);color:#fff}
  .tag-prof{background:#e7eef9;color:#2c5ca8}
  .bitem p{margin:0;font-size:13.5px;color:var(--muted)}
  .bitem .lk{font-size:11.5px;color:var(--accent);font-weight:700;margin-top:6px}
  .iconbtns{display:flex;flex-direction:column;gap:4px}
  .ibtn{border:0;background:transparent;cursor:pointer;font-size:16px;line-height:1;padding:4px;color:var(--muted);border-radius:6px}
  .ibtn:hover{background:var(--bg)}.ibtn.star.on{color:var(--accent)}.ibtn.del:hover{color:var(--bad)}

  .emp-stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .stat{flex:1;min-width:90px;background:var(--bg);border-radius:12px;padding:12px 14px}
  .stat b{font-family:'Bricolage Grotesque';font-size:22px;display:block;color:var(--primary)}
  .stat span{font-size:12px;color:var(--muted)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .chip{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:999px;padding:6px 6px 6px 13px;font-size:13px;font-variant-numeric:tabular-nums}
  .chip .pf{background:#e7eef9;color:#2c5ca8;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.03em}
  .chip button{border:0;background:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;color:var(--muted);font-size:14px;line-height:1}
  .chip button:hover{color:var(--bad)}

  .plist{display:grid;gap:10px}
  .prow{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-radius:12px;padding:12px 14px}
  .prow .pn{font-weight:600;font-size:14.5px}
  .prow .pc{font-size:12px;color:var(--muted)}
  .prow button{border:0;background:#fff;border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--muted);font-size:16px}
  .prow button:hover{color:var(--bad)}

  .qrwrap{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start}
  .qrbox{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;display:inline-block}
  .qrbox img,.qrbox canvas{display:block}
  .qrside{flex:1;min-width:240px}
  .linkfield{display:flex;gap:8px}.linkfield input{flex:1}

  .rank{display:grid;gap:10px;margin-top:6px}
  .rrow{display:grid;grid-template-columns:1fr auto;gap:6px 12px;align-items:center}
  .rrow .rname{font-size:14px;font-weight:600}
  .rrow .rval{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .bar{grid-column:1/-1;height:8px;background:var(--bg);border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent);border-radius:99px}

  .phone-stage{display:flex;justify-content:center;padding-top:6px}
  .phone{width:360px;max-width:100%;background:#0E1A12;border-radius:42px;padding:12px;box-shadow:0 30px 60px rgba(2,79,43,.22)}
  .screen{background:var(--bg);border-radius:32px;overflow:hidden;height:680px;display:flex;flex-direction:column}
  .notch{height:26px;display:flex;justify-content:center}
  .notch::after{content:"";width:120px;height:22px;background:#0E1A12;border-radius:0 0 16px 16px}
  .scr-body{flex:1;overflow-y:auto;padding:18px}

  .login{display:flex;flex-direction:column;justify-content:center;height:100%;text-align:center;padding:24px}
  .login img{width:180px;max-width:80%;height:auto;object-fit:contain;margin:0 auto 22px;display:block}
  .login h2{font-size:23px;margin-bottom:6px}
  .login p{color:var(--muted);font-size:14px;margin:0 0 22px}
  .login input{text-align:center;font-size:18px;letter-spacing:.04em;font-variant-numeric:tabular-nums}
  .err{background:#FBEAEB;color:var(--bad);border-radius:12px;padding:11px 14px;font-size:13.5px;font-weight:600;margin-top:14px}

  .scr-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
  .greet{font-size:13px;color:var(--muted)}
  .scr-head h2{font-size:22px;margin-top:2px;color:var(--primary)}
  .hellosub{font-size:13.5px;color:var(--muted);margin:2px 0 16px}
  .logout{border:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:7px 11px;font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer}

  .search{position:relative;margin-bottom:12px}
  .search input{padding-left:38px;font-size:14px}
  .search .mag{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.5}
  .catchips{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px}
  .catchips::-webkit-scrollbar{height:0}
  .catchip{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
  .catchip.on{background:var(--primary);color:#fff;border-color:var(--primary)}

  .pcards{display:grid;gap:12px}
  .pcard{border-radius:18px;padding:18px;color:#fff;cursor:pointer;position:relative;overflow:hidden}
  .pc-icon{font-size:26px;height:42px;display:flex;align-items:center}
  .pc-icon img{width:42px;height:42px;border-radius:11px;object-fit:cover;background:#fff}
  .pcard h3{font-size:17px;margin:8px 0 3px;color:#fff}
  .pcard p{margin:0;font-size:13px;opacity:.92;padding-right:20px}
  .pcard .go{position:absolute;right:16px;bottom:16px;font-size:20px;opacity:.85}
  .pcard .pbadges{position:absolute;top:14px;right:14px;display:flex;gap:6px}
  .pbadge{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;background:rgba(255,255,255,.22);color:#fff;padding:3px 8px;border-radius:99px}
  .featlabel{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin:2px 0 8px}
  .noresult{text-align:center;color:var(--muted);font-size:14px;padding:30px 10px}

  .detail .back{border:0;background:transparent;font:inherit;font-weight:600;color:var(--primary);cursor:pointer;padding:0;margin-bottom:14px;font-size:14px}
  .detail .dhead{border-radius:18px;padding:22px;color:#fff;margin-bottom:16px}
  .dh-icon{font-size:30px;height:46px;display:flex;align-items:center}
  .dh-icon img{width:46px;height:46px;border-radius:12px;object-fit:cover;background:#fff}
  .detail .dhead h2{color:#fff;font-size:22px;margin:10px 0 0}
  .detail .dhead .dcat{font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;opacity:.85}
  .pitch{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;font-size:14.5px;margin-bottom:16px}
  .pitch .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:6px}
  .steps .lbl,.dlinks .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--primary);margin-bottom:10px}
  .step{display:flex;gap:12px;margin-bottom:12px}
  .step .n{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--primary-soft);color:var(--primary);font-weight:700;font-size:13px;display:grid;place-items:center}
  .step p{margin:3px 0 0;font-size:14px}
  .stepimg{width:100%;border-radius:12px;border:1px solid var(--line);margin-bottom:10px;display:block}
  .dlinks{margin-top:18px}
  .applink{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:9px;text-decoration:none;color:var(--ink);font-size:14px;font-weight:600}
  .applink:hover{border-color:var(--primary);background:var(--primary-soft)}
  .applink .ico{font-size:18px}.applink .arr{margin-left:auto;color:var(--muted)}

  .loading{padding:60px;text-align:center;color:var(--muted)}
  .note{font-size:12.5px;color:var(--muted);margin-top:14px;line-height:1.55}

  /* ===== Cinema / Sorteio ===== */
  .cstatus{display:inline-block;font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px;background:var(--bg);color:var(--muted)}
  .cstatus.open{background:var(--accent-soft);color:var(--accent)}
  .cstatus.pub{background:var(--primary-soft);color:var(--primary)}
  .cine-add{display:grid;grid-template-columns:1fr 90px;gap:8px}
  .cine-films{display:grid;gap:8px;margin-top:10px}
  .adm-film{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:11px;padding:10px 13px}
  .adm-film .af-nm{flex:1;font-weight:600;font-size:14px}
  .adm-film .af-cnt{font-size:12px;color:var(--muted);white-space:nowrap}
  .adm-film .af-del{border:0;background:#fff;border-radius:8px;width:28px;height:28px;cursor:pointer;color:var(--muted);font-size:15px}
  .adm-film .af-del:hover{color:var(--bad)}
  .cine-dates{display:flex;align-items:center;gap:8px}.cine-dates input{flex:1}.cine-dates span{color:var(--muted);font-size:13px}
  .cine-det{background:var(--bg);border-radius:11px;margin-top:8px;overflow:hidden}
  .cine-det summary{list-style:none;cursor:pointer;padding:11px 13px;display:flex;justify-content:space-between;font-weight:600;font-size:14px}
  .cine-det summary::-webkit-details-marker{display:none}
  .cine-names{padding:0 13px 12px;display:flex;flex-wrap:wrap;gap:6px}
  .cine-names span{background:#fff;border:1px solid var(--line);border-radius:7px;padding:3px 9px;font-size:12.5px}
  .cine-names .muted{opacity:.6;border:0;background:transparent}
  .cine-rblock{margin-bottom:12px}
  .cine-rtitle{font-weight:700;font-size:14px;margin-bottom:6px}.cine-rtitle span{color:var(--muted);font-weight:500;font-size:12px}
  .cine-tk{background:var(--primary-soft);color:var(--primary);border-radius:9px;padding:7px 11px;font-size:13.5px;font-weight:600;margin-bottom:5px}
  .cine-tk.vac{background:var(--bg);color:var(--muted);font-weight:500;font-style:italic}
  .cine-roll{margin-top:12px;text-align:center;padding:22px;background:var(--bg);border:1px dashed var(--line);border-radius:14px}
  .cine-roll .cr-lbl{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:8px;font-weight:700}
  .cine-roll .cr-name{font-family:'Bricolage Grotesque';font-weight:800;font-size:24px;color:var(--primary)}
  .cine-banner{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--primary),var(--card3));color:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;cursor:pointer}
  .cine-banner .cine-ic{font-size:26px}
  .cine-banner .cine-tx{flex:1;min-width:0;display:flex;flex-direction:column}
  .cine-banner .cine-tx b{font-size:15px}.cine-banner .cine-tx span{font-size:12.5px;opacity:.92}
  .cine-banner .cine-vtag{background:rgba(255,255,255,.22);font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;white-space:nowrap}
  .cine-banner .cine-go{font-size:20px;opacity:.85}
  .cine-screen .cine-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .cine-screen .cine-head-ic{width:46px;height:46px;border-radius:13px;background:var(--primary);color:#fff;display:grid;place-items:center;font-size:24px;flex:none}
  .cine-screen .cine-head h2{font-size:21px;color:var(--primary)}
  .cine-msg{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-size:14px;color:var(--muted);margin-bottom:12px}
  .cine-res{border-radius:13px;padding:15px;font-size:14.5px;font-weight:600;margin-bottom:14px}
  .cine-res.win{background:var(--primary-soft);color:var(--primary)}
  .cine-res.lose{background:var(--bg);color:var(--muted)}
  .filmlist{display:grid;gap:10px;margin-bottom:14px}
  .filmrow{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:13px;padding:13px 14px;background:#fff;cursor:pointer}
  .filmrow.sel{border-color:var(--primary);background:var(--primary-soft)}
  .filmrow.done{opacity:.85;cursor:default;border-style:dashed}
  .filmrow .fr-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex:none}
  .filmrow.sel .fr-radio{border-color:var(--primary)}
  .filmrow.sel .fr-radio::after{content:"";display:block;width:10px;height:10px;border-radius:50%;background:var(--primary);margin:3px}
  .filmrow .fr-info{flex:1;min-width:0}.filmrow .fr-info b{font-size:15px}.filmrow .fr-info span{display:block;font-size:12px;color:var(--muted)}
  .filmrow .fr-chk{font-size:12.5px;font-weight:700;color:var(--primary);white-space:nowrap}
  .vsec{margin-top:8px}.vsec-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--primary);margin-bottom:10px}
  .voucher{display:flex;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
  .voucher .v-stub{flex:none;width:40px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center}
  .voucher .v-stub span{writing-mode:vertical-rl;transform:rotate(180deg);font-weight:800;font-size:11px;letter-spacing:2px}
  .voucher .v-body{flex:1;min-width:0;padding:12px 14px}
  .voucher .v-film{font-family:'Bricolage Grotesque';font-weight:800;font-size:16px;color:var(--ink)}
  .voucher .v-code{font-size:13px;margin-top:3px}.voucher .v-code b{font-variant-numeric:tabular-nums;letter-spacing:.5px}
  .voucher .v-per{font-size:12.5px;color:var(--muted);margin-top:4px}
  .voucher .v-info{font-size:12.5px;color:var(--ink);background:var(--bg);border-radius:8px;padding:7px 9px;margin-top:8px}
  .voucher .v-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:9px;font-size:12px;color:var(--muted)}
  .vstatus{font-weight:700;padding:2px 9px;border-radius:99px;white-space:nowrap}
  .vstatus.valid{background:var(--primary-soft);color:var(--primary)}
  .vstatus.soon{background:var(--accent-soft);color:var(--accent)}
  .vstatus.used{background:var(--bg);color:var(--muted)}
  .vstatus.exp{background:#FBEAEB;color:var(--bad)}
  .voucher.v-used,.voucher.v-exp{opacity:.7}
  .cine-screen .back{border:0;background:transparent;font:inherit;font-weight:600;color:var(--primary);cursor:pointer;padding:0;margin-bottom:14px;font-size:14px}
</style>
</head>

function fmtDate(s){ if(!s) return ''; const p=String(s).split('-'); return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s; }
function voucherStatus(v){ if(v.status==='used') return 'used';
  const today=new Date(); today.setHours(0,0,0,0);
  if(v.to){ const to=new Date(v.to+'T23:59:59'); if(today>to) return 'exp'; }
  if(v.from){ const from=new Date(v.from+'T00:00:00'); if(today<from) return 'soon'; }
  return 'valid'; }
function voucherStatusLabel(v,st){ st=st||voucherStatus(v);
  if(st==='used') return 'Utilizado';
  if(st==='exp') return 'Expirado';
  if(st==='soon') return 'V\u00e1lido a partir de '+fmtDate(v.from);
  return 'V\u00e1lido'; }

async function load(){
  try{
    const r=await window.storage.get('raguife:data');
    if(r&&r.value){ state=JSON.parse(r.value); migrate(); await migrateInlineImages(); await hydrateImages(); }
    else { state=seed(); await save(); }
  }catch(e){ state=seed(); try{await save()}catch(_){} }
  try{ const mr=await window.storage.get('raguife:metrics'); metrics=mr&&mr.value?JSON.parse(mr.value):emptyMetrics(); }catch(e){ metrics=emptyMetrics(); }
  try{ await loadRentries(); }catch(e){}
  try{ const lk=document.createElement('link'); lk.rel='icon'; lk.href=LOGO; document.head.appendChild(lk); }catch(e){}
  document.getElementById('loading').style.display='none';
  render();
}
async function save(){ try{ await window.storage.set('raguife:data',JSON.stringify(state)); return true; }
  catch(e){ console.error(e); alert('Não consegui salvar os dados do portal.'); return false; } }

/* imagens em chaves separadas */
async function putImage(dataURL){
  const iid=id();
  try{ const ok=await window.storage.set('raguife:img:'+iid,dataURL); if(ok===null) throw 0; imgCache[iid]=dataURL; return iid; }
  catch(e){ console.error(e); alert('Uma imagem era grande demais e não pôde ser salva. Tente uma imagem mais leve.'); return null; }
}
async function delImage(iid){ if(!iid)return; try{ await window.storage.delete('raguife:img:'+iid); }catch(e){} delete imgCache[iid]; }
async function hydrateImages(){
  const ids=new Set();
  state.benefits.forEach(b=>{ if(b.iconImgId) ids.add(b.iconImgId); (b.stepImgIds||[]).forEach(i=>ids.add(i)); });
  for(const iid of ids){ if(imgCache[iid])continue; try{ const r=await window.storage.get('raguife:img:'+iid); if(r&&r.value) imgCache[iid]=r.value; }catch(e){} }
}
async function migrateInlineImages(){
  let changed=false;
  for(const b of state.benefits){
    if(b.iconImg){ if(!b.iconImgId){ const nid=await putImage(b.iconImg); if(nid) b.iconImgId=nid; } delete b.iconImg; changed=true; }
    if(b.stepImgs && b.stepImgs.length){ if(!b.stepImgIds||!b.stepImgIds.length){ b.stepImgIds=[]; for(const d of b.stepImgs){ const nid=await putImage(d); if(nid) b.stepImgIds.push(nid); } } delete b.stepImgs; changed=true; }
    else if(b.stepImgs){ delete b.stepImgs; changed=true; }
    if(!b.stepImgIds) b.stepImgIds=[];
  }
  if(changed) await save();
}
function imgUrl(iid){ return iid&&imgCache[iid]?imgCache[iid]:null; }
function migrate(){
  if(!state.cinema) state.cinema=emptyCinema();
  else { const _c=emptyCinema(); for(const _k in _c) if(!(_k in state.cinema)) state.cinema[_k]=_c[_k]; }
  if(!Array.isArray(state.vouchers)) state.vouchers=[];
  delete state.metrics;
  if(!('featuredId' in state)) state.featuredId=null;
  if(!state.portalUrl) state.portalUrl='https://beneficios.raguife.com.br';
  if(!state.profiles) state.profiles=[];
  (state.benefits||[]).forEach(b=>{ if(!b.links)b.links=[]; if(!b.createdAt)b.createdAt=0; if(!b.profileIds)b.profileIds=[]; if(!b.stepImgIds)b.stepImgIds=[]; });
  (state.employees||[]).forEach(e=>{ if(!('profile' in e)) e.profile=''; });
}

function onlyDigits(s){ return (s||'').replace(/\D/g,''); }
function fmtCpf(d){ d=onlyDigits(d); if(d.length!==11)return d; return d.slice(0,3)+'.'+d.slice(3,6)+'.'+d.slice(6,9)+'-'+d.slice(9); }
function isNew(b){ return b.createdAt && (Date.now()-b.createdAt)<NEW_DAYS*DAY; }
function profName(idv){ const p=state.profiles.find(p=>p.id===idv); return p?p.name:''; }

/* image resize */
function fileToImg(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>{const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=r.result;}; r.onerror=rej; r.readAsDataURL(file); }); }
async function resizeImage(file,opt){ opt=opt||{}; const im=await fileToImg(file);
  const c=document.createElement('canvas'), ctx=c.getContext('2d');
  if(opt.square){ const s=opt.size||96; c.width=c.height=s; const m=Math.min(im.width,im.height), sx=(im.width-m)/2, sy=(im.height-m)/2;
    ctx.drawImage(im,sx,sy,m,m,0,0,s,s); return c.toDataURL('image/png'); }
  let w=im.width,h=im.height; const maxW=opt.maxW||760, maxH=opt.maxH||2200;
  if(w>maxW){h=h*maxW/w;w=maxW;} if(h>maxH){w=w*maxH/h;h=maxH;}
  c.width=w;c.height=h; ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(im,0,0,w,h);
  return c.toDataURL('image/jpeg',opt.quality||0.72);
}

function initLinkRows(){
  const box=document.getElementById('linkRows'); if(!box) return;

  box.innerHTML='';
  if(ed&&ed.links&&ed.links.length) ed.links.forEach(l=>addLinkRow(l.label,l.url)); else addLinkRow();

function addLinkRow(label='',url=''){
  const box=document.getElementById('linkRows'); if(!box) return;
  const row=document.createElement('div'); row.className='linkrow';
  row.innerHTML=`<input class="lk-label" list="lklabels" placeholder="Rótulo" value="${escAttr(label)}"/>
    <input class="lk-url" placeholder="https://..." value="${escAttr(url)}"/>

  box.appendChild(row);
  if(!document.getElementById('lklabels')){

    ['App Store','Google Play','Site','WhatsApp','Portal','Telefone'].forEach(o=>{const op=document.createElement('option');op.value=o;dl.appendChild(op);});

}
function readLinks(){
  const out=[];
  document.querySelectorAll('#linkRows .linkrow').forEach(r=>{
    const label=r.querySelector('.lk-label').value.trim(); let url=r.querySelector('.lk-url').value.trim();
    if(!url) return; if(!/^(https?:|mailto:|tel:)/i.test(url)) url='https://'+url;
    out.push({label:label||'Acessar',url});
  });
  return out;
}

async function onIconFile(input){ const f=input.files[0]; if(!f)return;
  try{ const d=await resizeImage(f,{square:true,size:88}); draftIcon={id:null,data:d}; renderIconPreview(); }catch(e){ alert('Não consegui ler a imagem.'); } input.value=''; }
function removeDraftIcon(){ draftIcon=null; renderIconPreview(); }
function renderIconPreview(){ const el=document.getElementById('iconPreview'); if(!el)return;
  el.innerHTML=draftIcon&&draftIcon.data?`<div class="iconprev"><img src="${escAttr(draftIcon.data)}"/><span style="font-size:12.5px;color:var(--muted)">Esta imagem será o ícone</span><button onclick="removeDraftIcon()">remover</button></div>`:''; }
async function onStepFiles(input){
  for(const f of input.files){ try{ const d=await resizeImage(f,{maxW:680,quality:0.7}); draftStepImgs.push({id:null,data:d}); }catch(e){} }
  renderStepThumbs(); input.value='';
}
function removeStepImg(i){ draftStepImgs.splice(i,1); renderStepThumbs(); }
function renderStepThumbs(){ const el=document.getElementById('stepThumbs'); if(!el)return;
  el.innerHTML=draftStepImgs.map((it,i)=>`<div class="thumb"><img src="${escAttr(it.data)}"/><button onclick="removeStepImg(${i})">×</button></div>`).join(''); }

function resetDrafts(){ draftIcon=null; draftStepImgs=[]; }
function startEdit(bid){ const b=state.benefits.find(x=>x.id===bid); editingId=bid;
  draftIcon=b.iconImgId?{id:b.iconImgId,data:imgUrl(b.iconImgId)}:null;
  draftStepImgs=(b.stepImgIds||[]).map(iid=>({id:iid,data:imgUrl(iid)})).filter(x=>x.data);
  render(); window.scrollTo({top:0,behavior:'smooth'}); }
function cancelEdit(silent){ editingId=null; resetDrafts(); if(!silent) render(); }

async function saveBenefit(){
  const name=val('b_name').trim(), cat=val('b_cat').trim()||'Geral';
  if(!name){ alert('Dê um nome ao benefício.'); return; }
  const steps=val('b_steps').split('\n').map(s=>s.trim()).filter(Boolean);
  const ed=editingId?state.benefits.find(x=>x.id===editingId):null;
  const oldIconId=ed?ed.iconImgId:null, oldStepIds=ed?(ed.stepImgIds||[]).slice():[];

  let iconImgId=null;
  if(draftIcon){ iconImgId = draftIcon.id ? draftIcon.id : await putImage(draftIcon.data); }
  const stepImgIds=[];
  for(const it of draftStepImgs){ if(it.id) stepImgIds.push(it.id); else { const nid=await putImage(it.data); if(nid) stepImgIds.push(nid); } }

  if(oldIconId && oldIconId!==iconImgId) await delImage(oldIconId);
  for(const oid of oldStepIds){ if(!stepImgIds.includes(oid)) await delImage(oid); }

  const data={name,cat,icon:val('b_icon')||'💸',iconImgId,color:parseInt(val('b_color')||'0',10),
    profileIds:readProfiles(),pitch:val('b_pitch').trim()||'Um benefício pensado pra você.',
    steps,stepImgIds,links:readLinks()};
  if(!data.steps.length && !data.stepImgIds.length) data.steps=['Procure o RH para saber como aproveitar.'];
  if(editingId){ Object.assign(ed,data); editingId=null; }
  else state.benefits.push({id:id(),createdAt:Date.now(),...data});
  resetDrafts(); await save(); render();
}
function delBenefit(bid){ if(!confirm('Remover este benefício? Ele some para todos os funcionários.'))return;
  const b=state.benefits.find(x=>x.id===bid);
  if(b){ if(b.iconImgId) delImage(b.iconImgId); (b.stepImgIds||[]).forEach(delImage); }
  state.benefits=state.benefits.filter(x=>x.id!==bid);
  if(state.featuredId===bid) state.featuredId=null; if(editingId===bid){editingId=null;resetDrafts();} save(); render(); }
function toggleFeatured(bid){ state.featuredId=state.featuredId===bid?null:bid; save(); render(); }

function downloadTemplate(){
  const rows=[['Nome','CPF','Perfil'],['Maria Souza','123.456.789-00','Vendas'],['João Lima','987.654.321-00','Administrativo']];
  if(typeof XLSX!=='undefined'){
    const ws=XLSX.utils.aoa_to_sheet(rows); ws['!cols']=[{wch:28},{wch:18},{wch:18}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Funcionarios');
    XLSX.writeFile(wb,'modelo-funcionarios-raguife.xlsx');
  } else {
    const csv=rows.map(r=>r.join(';')).join('\n'); const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='modelo-funcionarios-raguife.csv'; a.click();
  }
}
function parseCSV(text){ const lines=text.split(/\r?\n/).filter(l=>l.trim().length); if(!lines.length)return [];
  const delim=(lines[0].split(';').length>=lines[0].split(',').length)?';':',';
  return lines.map(l=>l.split(delim).map(c=>c.replace(/^"|"$/g,'').trim())); }
function onSheet(input,replace){ const f=input.files[0]; if(!f)return; const name=f.name.toLowerCase(); const r=new FileReader();
  const useText = name.endsWith('.csv')||typeof XLSX==='undefined';
  r.onload=e=>{ let rows; try{
      if(useText){ const txt=typeof e.target.result==='string'?e.target.result:new TextDecoder('utf-8').decode(e.target.result); rows=parseCSV(txt); }
      else { const wb=XLSX.read(e.target.result,{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; rows=XLSX.utils.sheet_to_json(ws,{header:1}); }
    }catch(err){ alert('Não consegui ler a planilha. Use o modelo baixado.'); return; }
    importRows(rows,replace); input.value='';
  };
  if(useText) r.readAsText(f); else r.readAsArrayBuffer(f);
}
function importRows(rows,replace){
  if(!rows||rows.length<2){ alert('Planilha vazia ou sem dados.'); return; }
  const head=rows[0].map(h=>(h==null?'':h).toString().trim().toLowerCase());
  const ci=head.findIndex(h=>h.includes('cpf')), ni=head.findIndex(h=>h.includes('nome')), pi=head.findIndex(h=>h.includes('perfil'));
  if(ci<0){ alert('Não encontrei a coluna CPF. Use a planilha modelo.'); return; }
  const map={}; if(!replace) state.employees.forEach(e=>map[e.cpf]=e);
  let added=0,updated=0; const newP=[];
  for(let i=1;i<rows.length;i++){ const row=rows[i]; if(!row)continue;
    const cpf=onlyDigits((row[ci]==null?'':row[ci]).toString()); if(cpf.length<11)continue; const c=cpf.slice(0,11);
    const nm=ni>=0?(row[ni]==null?'':row[ni]).toString().trim():'';
    const pf=pi>=0?(row[pi]==null?'':row[pi]).toString().trim():'';
    if(pf && !state.profiles.some(p=>p.name.toLowerCase()===pf.toLowerCase()) && !newP.some(x=>x.toLowerCase()===pf.toLowerCase())) newP.push(pf);
    if(map[c]) updated++; else added++;
    map[c]={cpf:c,name:nm,profile:pf};
  }
  newP.forEach(n=>state.profiles.push({id:id(),name:n}));
  state.employees=Object.values(map); save(); render();
  alert(`Importado: ${added} novo(s), ${updated} atualizado(s).`+(newP.length?`\nPerfis criados: ${newP.join(', ')}.`:''));
}
function importEmps(){ const lines=val('e_bulk').split('\n').map(s=>s.trim()).filter(Boolean); const map={}; state.employees.forEach(e=>map[e.cpf]=e); let n=0;
  for(const ln of lines){ const cpf=onlyDigits(ln); if(cpf.length<11)continue; const c=cpf.slice(0,11);
    map[c]={cpf:c,name:ln.replace(/[\d.\-\s]/g,' ').replace(/\s+/g,' ').trim(),profile:(map[c]&&map[c].profile)||''}; n++; }
  if(!n){ alert('Não encontrei CPFs válidos (11 dígitos).'); return; }
  state.employees=Object.values(map); save(); render();
}
function delEmp(cpf){ state.employees=state.employees.filter(e=>e.cpf!==cpf); save(); render(); }

/* ---------- Resultados ---------- */
function rhMetrics(){
  const m=metrics, users=Object.keys(m.users).length;
  const totalViews=Object.values(m.views).reduce((a,b)=>a+b,0), totalClicks=Object.values(m.linkClicks).reduce((a,b)=>a+b,0);
  const ranked=state.benefits.map(b=>({b,v:m.views[b.id]||0,c:m.linkClicks[b.id]||0})).sort((x,y)=>y.v-x.v);
  const max=Math.max(1,...ranked.map(r=>r.v));
  const rank=ranked.length?`<div class="rank">${ranked.map(r=>`<div class="rrow">
    <span class="rname">${r.b.icon} ${esc(r.b.name)}</span>
    <span class="rval">${r.v} ${r.v===1?'visualização':'visualizações'}${r.c?' · '+r.c+' cliques':''}</span>
    <div class="bar"><i style="width:${Math.round(r.v/max*100)}%"></i></div></div>`).join('')}</div>`
    :`<div class="empty">Sem benefícios para medir.</div>`;
  return `<div class="card">
    <h2>Resultados</h2>
    <div class="sub">Os números aparecem conforme os funcionários usam o portal.</div>
    <div class="emp-stats">
      <div class="stat"><b>${users}</b><span>funcionários acessaram</span></div>
      <div class="stat"><b>${totalViews}</b><span>benefícios abertos</span></div>
      <div class="stat"><b>${totalClicks}</b><span>cliques em links</span></div>
    </div>
    <h2 style="font-size:16px;margin:22px 0 10px">Benefícios mais vistos</h2>${rank}
    <div class="note">Mostra qual benefício ninguém olha (reforce a divulgação) e prova para a diretoria que o portal está sendo usado.
      <button class="btn sm line" style="margin-top:10px" onclick="resetMetrics()">Zerar números (teste)</button></div>
  </div>`;
}
function resetMetrics(){ if(!confirm('Zerar todos os números?'))return; metrics=emptyMetrics(); try{window.storage.set('raguife:metrics',JSON.stringify(metrics));}catch(e){} render(); }

/* ===================== MÉTRICAS (chave separada, à prova de concorrência) ===================== */
async function bumpMetric(fn){
  try{
    const mr=await window.storage.get('raguife:metrics');
    const m=mr&&mr.value?JSON.parse(mr.value):emptyMetrics();
    ['users','views','linkClicks'].forEach(k=>{ if(!m[k]) m[k]={}; });
    if(typeof m.logins!=='number') m.logins=0;
    fn(m); metrics=m;
    await window.storage.set('raguife:metrics',JSON.stringify(m));
  }catch(e){ try{ fn(metrics); }catch(_){} }
}

/* ===================== INSCRIÇÕES (uma chave por inscrição = sem conflito) ===================== */
function rkeys(r){ return (r&&r.keys)?r.keys.map(k=>typeof k==='string'?k:(k.key||k.name)):[]; }
async function loadRentries(){
  try{
    const r=await window.storage.list('raguife:rentry:'); const keys=rkeys(r); const out=[];
    await Promise.all(keys.map(async k=>{ try{ const g=await window.storage.get(k); if(g&&g.value) out.push(JSON.parse(g.value)); }catch(e){} }));
    rentries=out;
  }catch(e){ rentries=[]; }
  return rentries;
}
async function addRentry(en){ const key='raguife:rentry:'+id()+Date.now().toString(36);
  try{ await window.storage.set(key,JSON.stringify(en)); }catch(e){} }
async function clearRentries(){
  try{ const r=await window.storage.list('raguife:rentry:'); const keys=rkeys(r);
    await Promise.all(keys.map(k=>window.storage.delete(k).catch(()=>{}))); }catch(e){}
  rentries=[];
}
function countEntries(fid){ return rentries.filter(e=>e.fid===fid).length; }
function shuffleArr(a){ const x=a.slice(); for(let i=x.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=x[i]; x[i]=x[j]; x[j]=t; } return x; }

function copyCinemaResumo(){ const t=cinemaResumoTexto();
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(t).then(()=>alert('Resumo copiado!'),()=>prompt('Copie o resumo:',t)); else prompt('Copie o resumo:',t); }
async function doCinemaDraw(){
  await loadRentries(); const c=state.cinema;
  if(!c.films.length){ alert('Adicione pelo menos um filme.'); return; }
  if(!rentries.length){ alert('Ninguém se inscreveu ainda.'); return; }
  const repeat=c.allowRepeat; const won=new Set();
  const ordem=repeat?c.films:shuffleArr(c.films); const mapa={};
  ordem.forEach(f=>{ let cand=shuffleArr(rentries.filter(e=>e.fid===f.id));
    if(!repeat) cand=cand.filter(e=>!won.has(e.cpf));
    const g=[]; for(let i=0;i<f.vagas;i++){ const w=i<cand.length?cand[i]:null; g.push(w?{cpf:w.cpf,name:w.name}:null); if(w&&!repeat) won.add(w.cpf); }
    mapa[f.id]=g;
  });
  const results=c.films.map(f=>({fid:f.id,fnome:f.nome,vagas:f.vagas,inscritos:rentries.filter(e=>e.fid===f.id).map(e=>e.name),ganhadores:mapa[f.id]}));
  const stage=document.getElementById('cine-stage');
  const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const pool=rentries.map(e=>e.name);
  const finish=()=>{ c.results=results; c.published=false; c.protocolo='CS-'+Date.now().toString(36).toUpperCase()+'-'+Math.floor(1000+Math.random()*9000); c.drawnAt=Date.now(); save(); render(); };
  if(reduce||pool.length<2||!stage){ finish(); return; }
  stage.innerHTML='<div class="cine-roll"><div class="cr-lbl">Sorteando…</div><div class="cr-name" id="crName">—</div></div>';
  const reel=document.getElementById('crName'); let t=0;
  const iv=setInterval(()=>{ reel.textContent=pool[Math.floor(Math.random()*pool.length)]; if(++t>=16){ clearInterval(iv); finish(); } },70);
}
async function publishCinema(){
  const c=state.cinema; if(!c.results) return;
  c.published=true; c.open=false;
  state.vouchers=state.vouchers.filter(v=>v.protocolo!==c.protocolo);
  c.results.forEach(f=>f.ganhadores.forEach(g=>{ if(g){ state.vouchers.push({id:id(),code:('CINE-'+Math.random().toString(36).slice(2,8)).toUpperCase(),cpf:g.cpf,name:g.name,fnome:f.fnome,from:c.voucherFrom||'',to:c.voucherTo||'',info:c.voucherInfo||'',status:'valid',protocolo:c.protocolo,issuedAt:Date.now()}); } }));
  await save(); alert('Resultado publicado! Os ganhadores já veem o voucher no app.'); render();
}
async function resetCinema(){
  if(!confirm('Reiniciar o sorteio? Apaga inscrições, resultado e vouchers deste sorteio.')) return;
  const c=state.cinema; await clearRentries();
  if(c.protocolo) state.vouchers=state.vouchers.filter(v=>v.protocolo!==c.protocolo);
  c.results=null; c.published=false; c.open=false; c.protocolo=null; c.drawnAt=null;
  rentries=[]; await save(); render();
}
function useVoucher(vid){ const v=state.vouchers.find(x=>x.id===vid); if(v){ v.status='used'; v.usedAt=Date.now(); save(); render(); } }
function unuseVoucher(vid){ const v=state.vouchers.find(x=>x.id===vid); if(v){ v.status='valid'; delete v.usedAt; save(); render(); } }
function cinemaResultsHTML(){ const data=state.cinema.results; if(!data) return '';
  return data.map(f=>{ const ok=f.ganhadores.filter(Boolean).length;
    return `<div class="cine-rblock"><div class="cine-rtitle">${esc(f.fnome)} <span>${ok}/${f.vagas} ingresso(s)</span></div>${f.ganhadores.map(g=>g?`<div class="cine-tk">🎟️ ${esc(g.name)}</div>`:`<div class="cine-tk vac">— vaga sem ganhador</div>`).join('')}</div>`;
  }).join(''); }
function cinemaResumoTexto(){ const c=state.cinema; const d=c.results||[]; let t='SORTEIO DE CINEMA\nProtocolo: '+(c.protocolo||'-')+'\n';
  if(c.voucherFrom||c.voucherTo) t+='Voucher válido: '+(c.voucherFrom?fmtDate(c.voucherFrom):'')+(c.voucherTo?' até '+fmtDate(c.voucherTo):'')+'\n';
  d.forEach(f=>{ t+='\n'+f.fnome+' ('+f.vagas+' ingresso(s))\n'; f.ganhadores.forEach((g,i)=>{ t+='  '+(i+1)+'. '+(g?g.name:'— vaga sem ganhador')+'\n'; }); });
  return t; }

function selectFilm(fid){ selFilm=fid; render(); }
async function confirmRaffle(){
  if(!selFilm) return; const c=state.cinema; const f=c.films.find(x=>x.id===selFilm); if(!f) return;
  await loadRentries();
  if(rentries.some(e=>e.fid===selFilm && e.cpf===session.cpf)){ selFilm=null; render(); return; }
  await addRentry({fid:f.id,fnome:f.nome,cpf:session.cpf,name:session.name||fmtCpf(session.cpf),ts:Date.now()});
  selFilm=null; await loadRentries(); render();
}

  let period='Validade a combinar com o RH';

      <div class="v-foot"><span class="vstatus ${st}">${lbl}</span><span>${esc(v.name)}</span></div>

function scrCinema(){
  const c=state.cinema; const cpf=session.cpf;
  const myEntries=rentries.filter(e=>e.cpf===cpf);
  const myV=state.vouchers.filter(v=>v.cpf===cpf);
  let body=`<button class="back" onclick="backHome()">← Voltar</button>
    <div class="cine-head"><div class="cine-head-ic">🎬</div><h2>${esc(c.title||'Sorteio de Cinema')}</h2></div>`;
  if(c.published && c.results){
    body+= myV.length
      ? `<div class="cine-res win">🎉 Parabéns! Você foi sorteado. Veja seu voucher abaixo.</div>`
      : `<div class="cine-res lose">O resultado já saiu. Você não foi sorteado dessa vez — fique de olho no próximo! 🎬</div>`;
  } else if(c.open){
    if(!c.films.length){ body+=`<div class="cine-msg">O RH ainda não cadastrou filmes. Volte mais tarde.</div>`; }
    else {
      body+=`<div class="cine-msg">Escolha um filme e candidate-se. Você pode se inscrever em mais de um.</div>`;
      body+=`<div class="filmlist">`+c.films.map(f=>{
        const ins=myEntries.some(e=>e.fid===f.id); const n=countEntries(f.id);
        if(ins) return `<div class="filmrow done"><div class="fr-info"><b>${esc(f.nome)}</b><span>${f.vagas} ingresso(s) · ${n} inscrito(s)</span></div><span class="fr-chk">✓ inscrito</span></div>`;
        return `<div class="filmrow ${selFilm===f.id?'sel':''}" onclick="selectFilm('${f.id}')"><div class="fr-radio"></div><div class="fr-info"><b>${esc(f.nome)}</b><span>${f.vagas} ingresso(s) · ${n} inscrito(s)</span></div></div>`;
      }).join('')+`</div>`;
      body+=`<button class="btn" ${selFilm?'':'disabled'} onclick="confirmRaffle()">Confirmar inscrição</button>`;
    }
  } else {
    body+=`<div class="cine-msg">As inscrições estão encerradas. Aguarde o RH realizar o sorteio.</div>`;
  }
  if(myV.length){ body+=`<div class="vsec"><div class="vsec-lbl">🎟️ Meus vouchers</div>`+myV.map(voucherCardHTML).join('')+`</div>`; }
  return `<div class="detail cine-screen">${body}</div>`;
}

function fmtMask(v){ const d=onlyDigits(v).slice(0,11); return fmtCpf(d)||d; }
function tryLogin(){
  const cpf=onlyDigits(val('cpf_in')), errBox=document.getElementById('login_err');
  if(cpf.length!==11){ errBox.innerHTML='<div class="err">Digite os 11 dígitos do CPF.</div>'; return; }
  const emp=state.employees.find(e=>e.cpf===cpf);
  if(!emp){ errBox.innerHTML='<div class="err">CPF não liberado. Fale com o RH se você acha que é um engano.</div>'; return; }
  session=emp; bumpMetric(m=>{m.logins++;m.users[cpf]=true;}); funcSearch=''; funcCat='Todos'; render();
}
function logout(){ session=null; openBenefit=null; empNav=null; render(); }

function empProfileId(emp){ const p=state.profiles.find(p=>p.name.toLowerCase()===(emp.profile||'').toLowerCase()); return p?p.id:null; }
function visibleBenefits(emp){ const pid=empProfileId(emp);
  return state.benefits.filter(b=> !b.profileIds||b.profileIds.length===0 || (pid&&b.profileIds.includes(pid))); }
function categories(emp){ return ['Todos',...Array.from(new Set(visibleBenefits(emp).map(b=>b.cat)))]; }
function filtered(){ const q=funcSearch.trim().toLowerCase();
  return visibleBenefits(session).filter(b=>{
    if(funcCat!=='Todos' && b.cat!==funcCat) return false;
    if(q && !((b.name+' '+b.pitch+' '+b.cat).toLowerCase().includes(q))) return false;
    return true;
  });
}
function scrHome(){
  const first=session.name?session.name.split(' ')[0]:'tudo bem';
  return `<div class="scr-head">
    <div><div class="greet">Olá,</div><h2>${esc(first)} 👋</h2></div>
    <button class="logout" onclick="logout()">Sair</button></div>
    <p class="hellosub">Conheça os benefícios que a Raguife tem para você.</p>
    ${cinemaHomeCard()}<div class="search"><span class="mag">🔎</span>
      <input id="searchIn" placeholder="Buscar benefício" value="${escAttr(funcSearch)}" oninput="onSearch(this.value)"/></div>
    <div class="catchips" id="catChips">${renderChips()}</div>
    <div id="cardList">${renderCards()}</div>`;
}
function renderChips(){ return categories(session).map(c=>`<button class="catchip ${funcCat===c?'on':''}" onclick="setCat('${escAttr(c)}')">${esc(c)}</button>`).join(''); }
function renderCards(){
  let list=filtered();
  if(!list.length) return `<div class="noresult">Nada encontrado.<br>Tente outra busca ou categoria.</div>`;
  const featFirst=state.featuredId && funcCat==='Todos' && !funcSearch.trim();
  let feat=null;
  if(featFirst){ feat=list.find(b=>b.id===state.featuredId); if(feat) list=list.filter(b=>b.id!==feat.id); }
  const card=b=>`<div class="pcard" style="background:${CARD_COLORS[b.color]}" onclick="openB('${b.id}')">
      <div class="pbadges">${isNew(b)?'<span class="pbadge">Novo</span>':''}</div>
      <div class="pc-icon">${pcIcon(b)}</div><h3>${esc(b.name)}</h3>
      <p>${esc(b.pitch).slice(0,72)}${b.pitch.length>72?'…':''}</p><div class="go">→</div></div>`;
  let html=''; if(feat){ html+=`<div class="featlabel">★ Destaque do mês</div>${card(feat)}<div style="height:14px"></div>`; }
  html+=`<div class="pcards">${list.map(card).join('')}</div>`; return html;
}
function onSearch(v){ funcSearch=v; const el=document.getElementById('cardList'); if(el) el.innerHTML=renderCards(); }
function setCat(c){ funcCat=c; const ch=document.getElementById('catChips'); if(ch) ch.innerHTML=renderChips();
  const el=document.getElementById('cardList'); if(el) el.innerHTML=renderCards(); }
function openB(bid){ openBenefit=state.benefits.find(b=>b.id===bid); bumpMetric(m=>{m.views[bid]=(m.views[bid]||0)+1;}); render(); }
function trackLink(bid){ bumpMetric(m=>{m.linkClicks[bid]=(m.linkClicks[bid]||0)+1;}); }

function linkIcon(url){ const u=url.toLowerCase();
  if(u.includes('apps.apple')) return ''; if(u.includes('play.google')) return '▶️';
  if(u.startsWith('tel:')) return '📞'; if(u.includes('whatsapp')||u.includes('wa.me')) return '💬'; return '🔗'; }
function scrDetail(){
  const b=openBenefit;
  const textSteps=(b.steps&&b.steps.length)?b.steps.map((s,i)=>`<div class="step"><div class="n">${i+1}</div><p>${esc(s)}</p></div>`).join(''):'';
  const imgSteps=(b.stepImgIds&&b.stepImgIds.length)?b.stepImgIds.map(iid=>imgUrl(iid)).filter(Boolean).map(u=>`<img class="stepimg" src="${escAttr(u)}"/>`).join(''):'';
  const stepsBlock=(textSteps||imgSteps)?`<div class="steps"><div class="lbl">Como usar</div>${textSteps}${imgSteps}</div>`:'';
  const links=(b.links&&b.links.length)?`<div class="dlinks"><div class="lbl">Baixar / acessar</div>
    ${b.links.map(l=>`<a class="applink" href="${escAttr(l.url)}" target="_blank" rel="noopener noreferrer" onclick="trackLink('${b.id}')">
      <span class="ico">${linkIcon(l.url)}</span><span>${esc(l.label)}</span><span class="arr">↗</span></a>`).join('')}</div>`:'';
  return `<div class="detail">
    <button class="back" onclick="openBenefit=null;render()">← Voltar</button>
    <div class="dhead" style="background:${CARD_COLORS[b.color]}">
      <div class="dh-icon">${pcIcon(b)}</div><div class="dcat">${esc(b.cat)}</div><h2>${esc(b.name)}</h2></div>
    <div class="pitch"><div class="lbl">Por que vale a pena</div>${esc(b.pitch)}</div>
    ${stepsBlock}${links}
  </div>`;
}

function val(id){ const e=document.getElementById(id); return e?e.value:''; }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function escAttr(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

window.__storageReady.then(load).catch(function(){ load(); });
</script>
</body>
</html>
