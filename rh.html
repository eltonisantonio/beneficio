<html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raguife · RH / DP</title><meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ===========================================================================
   base.css — design tokens compartilhados (Funcionário + RH)
   Identidade Raguife: verde profundo + acento oliva, tipografia Bricolage/Inter.
   =========================================================================== */
:root{
  --bg:#eef5ec; --surface:#fff; --ink:#14241a; --muted:#647267; --line:#dce7db;
  --primary:#024f2b; --primary2:#0a6b3c; --soft:#e4f1e8;
  --accent:#739630; --accentSoft:#eef4e1;
  --bad:#c23a45; --badSoft:#fbeaeb; --warn:#b06b00; --warnSoft:#fff3d8;
  --ok:#1f7a4d; --okSoft:#e4f1e8;
  --shadow:0 12px 34px rgba(2,79,43,.10);
  --radius:16px;
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:Inter,system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased}

/* Toast — usado nas duas áreas */
.toast{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);
  background:#14241a;color:#fff;border-radius:999px;padding:11px 15px;
  font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:.2s;z-index:60;
  box-shadow:0 10px 30px rgba(0,0,0,.25)
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important}
}

/* ===========================================================================
   rh.css — Área RH/DP (desktop-first), redesign.
   Identidade Raguife: verde-floresta + acento oliva, tipografia Bricolage/Inter.
   Tom: calmo, organizado, profissional. Tokens base em base.css.
   =========================================================================== */
:root{
  --rh-canvas:#f3f7f0; --rh-paper:#ffffff; --rh-ink:#16241b; --rh-muted:#67746b;
  --rh-line:#e3ebdf; --rh-line2:#eef3ea; --rh-forest:#024f2b; --rh-pine:#022e1a;
  --rh-olive:#7aa42b; --rh-olive-soft:#eef4e1;
}
body{background:var(--rh-canvas);color:var(--rh-ink)}

/* eyebrow: rótulo curtinho que situa a seção */
.eyebrow{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--rh-olive)}

/* ---------- Login ---------- */
.rh-login{min-height:100vh;display:grid;place-items:center;padding:24px;
  background:radial-gradient(120% 90% at 50% -10%, #e9f2e4, var(--rh-canvas))}
.rh-login-card{background:var(--rh-paper);border:1px solid var(--rh-line);border-radius:24px;
  box-shadow:0 1px 2px rgba(20,40,26,.04),0 24px 60px rgba(2,79,43,.10);
  padding:38px 34px;width:min(400px,100%);text-align:center;border-top:3px solid var(--rh-forest)}
.rh-login-card img{width:148px;margin:0 auto 20px;display:block}
.rh-login-card h1{font-family:var(--display);color:var(--rh-ink);font-size:25px;margin:0 0 6px;letter-spacing:-.01em}
.rh-login-card p{color:var(--rh-muted);font-size:14px;margin:0 0 22px;line-height:1.5}
.rh-login-card .field{margin-bottom:11px;text-align:left}

/* ---------- Shell ---------- */
.rh-shell{display:grid;grid-template-columns:258px 1fr;min-height:100vh}

/* Sidebar */
.rh-side{background:linear-gradient(180deg,var(--rh-forest),var(--rh-pine));color:#fff;
  padding:20px 14px 16px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.rh-side .logo{padding:4px 8px 6px;margin-bottom:10px}
.rh-side .logo img{width:112px;display:block}
.rh-side nav{display:flex;flex-direction:column;gap:14px;flex:1;overflow:auto;padding-top:6px}
.rh-side nav::-webkit-scrollbar{width:0}
.nav-group{display:flex;flex-direction:column;gap:2px}
.nav-eyebrow{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.13em;
  color:rgba(255,255,255,.42);padding:2px 12px 6px}
.rh-side nav button{position:relative;display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:transparent;border:0;color:rgba(255,255,255,.82);font:inherit;font-weight:600;
  font-size:14px;padding:9px 12px;border-radius:11px;cursor:pointer;transition:background .15s,color .15s}
.rh-side nav button:hover{background:rgba(255,255,255,.08);color:#fff}
.rh-side nav button.active{background:rgba(255,255,255,.11);color:#fff}
.rh-side nav button.active::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:3px;
  border-radius:0 3px 3px 0;background:var(--rh-olive)}
.rh-side nav button .ic{width:20px;height:20px;display:grid;place-items:center;color:rgba(255,255,255,.7);flex:none}
.rh-side nav button.active .ic,.rh-side nav button:hover .ic{color:#fff}
.rh-side nav button .ic svg{width:19px;height:19px}

.rh-side .who{border-top:1px solid rgba(255,255,255,.14);padding-top:12px;margin-top:8px}
.who-id{display:flex;align-items:center;gap:10px;padding:0 6px 10px}
.who-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;
  display:grid;place-items:center;font-weight:800;font-size:15px;flex:none}
.who-tx{min-width:0}
.who-tx b{display:block;font-size:12.5px;color:#fff;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.who-tx span{font-size:11px;color:rgba(255,255,255,.6)}
.rh-side .who button{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
  color:#fff;border-radius:10px;padding:9px;font-weight:800;font-size:12.5px;cursor:pointer;transition:background .15s}
.rh-side .who button:hover{background:rgba(255,255,255,.18)}

/* Conteúdo */
.rh-main{padding:32px 36px 48px;max-width:1180px}
.rh-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.rh-head h1{font-family:var(--display);font-size:29px;color:var(--rh-ink);margin:5px 0 0;letter-spacing:-.02em;line-height:1.1}
.rh-head p{color:var(--rh-muted);margin:6px 0 0;font-size:14.5px;max-width:62ch}

/* ---------- Form & botões ---------- */
.field{width:100%;border:1px solid var(--rh-line);background:#fff;border-radius:11px;
  padding:11px 13px;font:inherit;color:var(--rh-ink);outline:none;transition:border .15s,box-shadow .15s}
.field:focus{border-color:var(--rh-forest);box-shadow:0 0 0 3px rgba(2,79,43,.12)}
label.lbl,.lbl{display:block;font-size:11.5px;font-weight:800;color:var(--rh-muted);margin:0 0 6px;
  text-transform:uppercase;letter-spacing:.05em}
.btn{border:0;background:var(--rh-forest);color:#fff;border-radius:11px;padding:10px 18px;
  font:inherit;font-weight:800;cursor:pointer;transition:background .15s,transform .05s;line-height:1.2}
.btn:hover{background:#0a6b3c}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.55;cursor:default}
.btn.secondary{background:var(--rh-olive-soft);color:var(--rh-forest)}
.btn.line{background:#fff;color:var(--rh-forest);border:1px solid var(--rh-line)}
.btn.line:hover{background:#f6faf2;border-color:#cfded0}
.btn.danger{background:var(--badSoft);color:var(--bad)}
.btn.danger:hover{background:#f7dcde}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:9px}
.error{display:none;background:var(--badSoft);color:var(--bad);border-radius:11px;padding:11px 13px;
  margin-top:12px;font-size:13px;font-weight:700;text-align:left}

/* ---------- KPIs ---------- */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--rh-paper);border:1px solid var(--rh-line);border-radius:16px;padding:18px 20px;position:relative}
.kpi b{display:block;font-family:var(--display);font-size:34px;color:var(--rh-forest);line-height:1;letter-spacing:-.02em}
.kpi span{display:block;margin-top:7px;font-size:13px;color:var(--rh-muted);font-weight:600}

/* ---------- Painéis ---------- */
.panel{background:var(--rh-paper);border:1px solid var(--rh-line);border-radius:16px;overflow:hidden;
  margin-bottom:22px;box-shadow:0 1px 2px rgba(20,40,26,.03),0 12px 30px rgba(20,40,26,.035)}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;
  border-bottom:1px solid var(--rh-line2);gap:12px;flex-wrap:wrap}
.panel-head h2{font-family:var(--display);font-size:17px;margin:0;color:var(--rh-ink);letter-spacing:-.01em}
.panel-body{padding:20px}

/* ---------- Tabelas ---------- */
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--rh-muted);
  padding:12px 18px;border-bottom:1px solid var(--rh-line);font-weight:800;background:#fbfcf9}
td{padding:13px 18px;border-bottom:1px solid var(--rh-line2);vertical-align:middle}
tr:last-child td{border-bottom:0}
tr:hover td{background:#f7faf4}
.muted{color:var(--rh-muted)}
.empty{padding:40px 24px;text-align:center;color:var(--rh-muted);font-size:14px}
.row-actions{display:flex;gap:6px;justify-content:flex-end}

/* tags / status */
.tag{display:inline-flex;align-items:center;border-radius:999px;padding:3px 10px;font-size:11px;
  font-weight:800;text-transform:uppercase;letter-spacing:.03em}
.tag.on{background:var(--okSoft);color:var(--ok)}
.tag.off{background:#eef0ec;color:#7c857d}
.tag.warn{background:var(--warnSoft);color:var(--warn)}
.tag.draft{background:#eef0ec;color:#7c857d}
.tag.open{background:var(--okSoft);color:var(--ok)}
.tag.closed{background:var(--warnSoft);color:var(--warn)}
.tag.drawn{background:#e6eefb;color:#2c5ca8}
.tag.published{background:var(--rh-olive-soft);color:var(--rh-forest)}

/* ---------- Form grid / chips ---------- */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.form-grid .full{grid-column:1/-1}
.form-grid textarea.field{min-height:84px;resize:vertical;font-family:var(--body);line-height:1.5}
.check{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--rh-ink)}
.check input{width:17px;height:17px;accent-color:var(--rh-forest)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rh-line);border-radius:999px;
  padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;user-select:none;transition:.12s;color:var(--rh-ink)}
.chip:hover{border-color:#cfded0}
.chip.on{background:var(--rh-forest);color:#fff;border-color:var(--rh-forest)}

/* ---------- Modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(8,20,12,.5);display:grid;place-items:center;padding:20px;z-index:50;
  backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:20px;width:min(720px,100%);max-height:90vh;overflow:auto;
  box-shadow:0 30px 80px rgba(0,0,0,.34)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;
  border-bottom:1px solid var(--rh-line2);position:sticky;top:0;background:#fff;z-index:2}
.modal-head h2{font-family:var(--display);font-size:20px;margin:0;letter-spacing:-.01em}
.modal-head button.x{background:transparent;border:0;font-size:24px;cursor:pointer;color:var(--rh-muted);line-height:1}
.modal-body{padding:22px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--rh-line2);
  position:sticky;bottom:0;background:#fff}

.icon-box{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;overflow:hidden;color:#fff;font-size:26px}
.icon-box.contain{padding:5px;background:#fff!important;border:1px solid var(--rh-line)}
.icon-box.contain img{max-width:100%;max-height:100%;object-fit:contain}
.icon-box.cover img{width:100%;height:100%;object-fit:cover}

.hint{font-size:13px;color:var(--rh-ink);background:var(--rh-olive-soft);border:1px solid #e2ebcf;
  border-radius:12px;padding:12px 14px;margin-bottom:16px;line-height:1.55}
.dropzone{display:block;width:100%;border:2px dashed var(--rh-line);border-radius:14px;padding:30px 20px;
  text-align:center;color:var(--rh-muted);cursor:pointer;line-height:1.6;transition:.15s}
.dropzone:hover{border-color:var(--rh-forest);background:#f7faf4;color:var(--rh-ink)}

/* link/film rows dentro de modais */
.link-row,.film-row{display:flex;gap:8px;margin-bottom:8px}

/* ---------- Responsivo: vira topo no celular ---------- */
@media (max-width:900px){
  .rh-shell{grid-template-columns:1fr}
  .rh-side{position:sticky;top:0;height:auto;flex-direction:column;padding:12px 12px 8px;z-index:20}
  .rh-side .logo{padding:2px 4px}
  .rh-side .logo img{width:96px}
  .rh-side nav{flex-direction:row;gap:8px;overflow-x:auto;padding:8px 2px}
  .nav-group{flex-direction:row;gap:6px}
  .nav-eyebrow{display:none}
  .rh-side nav button{width:auto;white-space:nowrap;padding:8px 12px}
  .rh-side nav button.active::before{display:none}
  .rh-side nav button.active{background:rgba(255,255,255,.16)}
  .rh-side .who{display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:0;padding-top:8px;margin-top:0}
  .who-id{padding:0}
  .rh-side .who button{width:auto;padding:8px 14px}
  .rh-main{padding:22px 16px 40px}
  .form-grid{grid-template-columns:1fr}
  .rh-head h1{font-size:24px}
}

</style></head><body>

// ============================================================================
// helpers.js — utilitários puros, sem dependência de Firebase.
// Compartilhado entre Funcionário e RH.
// ============================================================================

// --- Identificadores e escape de HTML ---------------------------------------
function id() {
  return Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
}
function esc(v) {
  return String(v ?? '').replace(/[&<>"]/g, s => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s]
  ));
}
function escAttr(v) {
  return esc(v).replace(/'/g, '&#39;');
}

// Versão "limpa" para prévias curtas: remove a marcação (** * _) e junta linhas.
function previewText(v) {
  return String(v || '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/(^|[\s(])\*([^*\n]+)\*/g, '$1$2')
    .replace(/(^|[\s(])_([^_\n]+)_/g, '$1$2')
    .replace(/\s+/g, ' ')
    .trim();
}

// Formata texto simples: **negrito**, *itálico* (ou _itálico_) e quebras de linha.
// Escapa o HTML primeiro (seguro), depois aplica a marcação leve.
function formatText(v) {
  let s = esc(v);
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>'); // **negrito**
  s = s.replace(/(^|[\s(])\*([^*\n]+)\*/g, '$1<em>$2</em>'); // *itálico*
  s = s.replace(/(^|[\s(])_([^_\n]+)_/g, '$1<em>$2</em>');   // _itálico_
  s = s.replace(/\n/g, '<br>');                               // quebras de linha
  return s;
}

// --- CPF ---------------------------------------------------------------------
// digits: extrai só os números. normalizeCpf: 11 dígitos com zeros à esquerda.
function digits(v) { return String(v ?? '').replace(/\D/g, ''); }
function normalizeCpf(v) { return digits(v).padStart(11, '0').slice(-11); }

// Máscara COMPLETA (uso interno/admin): 000.000.000-00
function cpfMaskFull(v) {
  return normalizeCpf(v).replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}
// Máscara SEGURA (exibida ao funcionário e no admin): ***.456.789-**
function cpfSafe(v) {
  const d = normalizeCpf(v);
  return '***.' + d.slice(3, 6) + '.' + d.slice(6, 9) + '-**';
}
function isValidCpfLength(v) { return digits(v).length === 11; }

// Hash SHA-256 do CPF normalizado → usado como ID do documento do funcionário.
// O CPF aberto NUNCA é gravado no banco; guardamos apenas o hash + a máscara.
async function cpfHash(v) {
  const norm = normalizeCpf(v);
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('rgf:' + norm));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

// --- Nomes -------------------------------------------------------------------
function firstName(n) {
  return String(n || '').trim().split(/\s+/)[0] || 'Colaborador';
}

// --- Datas -------------------------------------------------------------------
function nowLocalForInput() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}
function dt(v) {
  if (!v) return '';
  try { return new Date(v).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }); }
  catch { return String(v); }
}
function dateShort(v) {
  if (!v) return '';
  try { return new Date(v).toLocaleDateString('pt-BR'); } catch { return String(v); }
}
// Verifica se a data atual está dentro do intervalo [from, to] (ambos opcionais).
function dateOk(from, to) {
  const n = Date.now();
  if (from && new Date(from).getTime() > n) return false;
  if (to && new Date(to).getTime() < n) return false;
  return true;
}

// --- Voucher -----------------------------------------------------------------
function voucherCode() {
  const s = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out = '';
  for (let i = 0; i < 8; i++) out += s[Math.floor(Math.random() * s.length)];
  return out.slice(0, 4) + '-' + out.slice(4);
}

// --- Toast (notificação rápida) ----------------------------------------------
function toast(msg) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// Mapeia o texto da coluna "Perfil" da planilha para ids de perfis cadastrados.
function resolveProfileIds(profileText, profiles) {
  const raw = String(profileText || '').trim().toLowerCase();
  if (!raw) return [];
  // 1) tenta casar o TEXTO INTEIRO com um perfil (cobre "Estagiário/Aprendiz")
  const full = profiles.find(p => String(p.name).trim().toLowerCase() === raw);
  if (full) return [full.id];
  // 2) senão, divide por separadores e casa cada parte
  const names = raw.split(/[;,|/]/).map(x => x.trim()).filter(Boolean);
  return profiles
    .filter(p => names.includes(String(p.name).trim().toLowerCase()))
    .map(p => p.id);
}

// IMPORTAÇÃO: a nova planilha SUBSTITUI completamente a base anterior.
// rows: [{ name, cpf, profile, unit?, department?, role?, ... }]
// Retorna o resumo (totais) para exibir e gravar no histórico.
async function importEmployees(rows, meta = {}) {
  const profiles = await listProfiles();
  const existing = await listEmployees();
  const existingIds = new Set(existing.map(e => e.id));

  // Monta os novos documentos.
  const newDocs = [];
  const newIds = new Set();
  const totalsByProfile = {};
  let withoutProfile = 0;

  for (const r of rows) {
    const cpf = normalizeCpf(r.cpf);
    if (cpf.length !== 11) continue;
    const h = await cpfHash(cpf);
    if (newIds.has(h)) continue; // evita CPF duplicado na própria planilha
    newIds.add(h);

    const profileIds = resolveProfileIds(r.profile, profiles);
    if (!profileIds.length) withoutProfile++;
    profileIds.forEach(pid => { totalsByProfile[pid] = (totalsByProfile[pid] || 0) + 1; });

    newDocs.push({
      id: h,
      data: {
        name: String(r.name || '').trim(),
        firstName: firstName(r.name),
        cpfMasked: cpfSafe(cpf),
        profileIds,
        profileRaw: String(r.profile || '').trim(),
        unit: String(r.unit || '').trim(),
        department: String(r.department || '').trim(),
        role: String(r.role || '').trim(),
        situation: String(r.situation || '').trim(),
        admissionDate: String(r.admissionDate || '').trim(),
        registry: String(r.registry || '').trim(),
        wonFilms: [],          // títulos de filmes já ganhos (trava do sorteio)
        status: 'active',
        importId: meta.importId || '',
        updatedAt: Date.now()
      }
    });
  }

  // IDs a remover = existentes que não estão na nova planilha.
  const toRemove = [...existingIds].filter(x => !newIds.has(x));

  // Executa em lotes (limite do Firestore: 500 operações por batch).
  const ops = [];
  toRemove.forEach(rid => ops.push({ type: 'del', id: rid }));
  newDocs.forEach(nd => ops.push({ type: 'set', id: nd.id, data: nd.data }));

  for (let i = 0; i < ops.length; i += 450) {
    const batch = writeBatch(db);
    for (const op of ops.slice(i, i + 450)) {
      if (op.type === 'del') batch.delete(ref('employees', op.id));
      else batch.set(ref('employees', op.id), op.data);
    }
    await batch.commit();
  }

  const summary = {
    fileName: meta.fileName || '',
    totalEmployees: newDocs.length,
    totalAdded: newDocs.filter(nd => !existingIds.has(nd.id)).length,
    totalRemoved: toRemove.length,
    totalsByProfile,
    withoutProfile,
    createdAt: Date.now(),
    createdBy: meta.userEmail || ''
  };
  return summary;
}

// MOTOR DO SORTEIO (somente RH).
// Regras aplicadas:
//   - só concorre quem se inscreveu (clicou "Quero participar");
//   - ninguém ganha o mesmo TÍTULO de filme que já ganhou (agora ou no histórico);
//   - cada pessoa ganha no máximo 1 prêmio por sorteio.
async function drawRaffle(raffleId) {
  const raffle = await getRaffle(raffleId);
  if (!raffle) throw new Error('Sorteio não encontrado.');
  if (!raffle.films || !raffle.films.length) throw new Error('Cadastre ao menos um filme.');

  const entries = await listEntries(raffleId);
  const history = await listAllWinners();

  // Conjunto "cpfHash::tituloMinusculo" de filmes já ganhos no histórico.
  const wonBefore = new Set(
    history.map(w => `${w.cpfHash}::${String(w.filmTitle || '').trim().toLowerCase()}`)
  );

  const selectedThisRaffle = new Set(); // ninguém ganha 2x no mesmo sorteio
  const winners = [];

  for (const film of raffle.films) {
    if (film.active === false) continue;
    const titleKey = String(film.title || '').trim().toLowerCase();
    let pool = entries.filter(e =>
      e.filmId === film.id &&
      !selectedThisRaffle.has(e.cpfHash) &&
      !wonBefore.has(`${e.cpfHash}::${titleKey}`)
    );
    // Embaralha (Fisher–Yates) e escolhe a quantidade de ingressos.
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const picked = pool.slice(0, Math.max(0, Number(film.quantity || 0)));
    for (const e of picked) {
      selectedThisRaffle.add(e.cpfHash);
      winners.push({
        raffleId,
        filmId: film.id,
        filmTitle: film.title,
        cpfHash: e.cpfHash,
        employeeName: e.employeeName || '',
        voucherCode: voucherCode(),
        createdAt: Date.now()
      });
    }
  }

  // Grava ganhadores + atualiza wonFilms no doc do funcionário (em lotes).
  for (let i = 0; i < winners.length; i += 200) {
    const batch = writeBatch(db);
    for (const w of winners.slice(i, i + 200)) {
      batch.set(ref('raffle_winners', winnerKey(raffleId, w.cpfHash)), w);
      batch.update(ref('employees', w.cpfHash), {
        wonFilms: arrayUnionTitle(w.filmTitle)
      });
    }
    await batch.commit();
  }

  await updateDoc(ref('raffles', raffleId), {
    status: 'drawn', drawAt: Date.now(), updatedAt: Date.now()
  });
  return winners;
}

onAuthStateChanged(auth, async (user) => {

        <p style="font-size:11px;color:var(--muted);margin-top:10px">Detalhe técnico: ${esc(e?.message || e)}</p>
      </div></div>`;

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('pass').value;
  const err = document.getElementById('loginErr');
  const btn = document.getElementById('loginBtn');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    await DB.logAudit({ action: 'login', entity: 'auth', userEmail: email });
  } catch (e) {
    err.style.display = 'block';
    err.textContent = authError(e);
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}
function authError(e) {
  const c = String(e?.code || '');
  if (c.includes('invalid-credential') || c.includes('wrong-password') || c.includes('user-not-found'))
    return 'E-mail ou senha incorretos.';
  if (c.includes('too-many-requests')) return 'Muitas tentativas. Aguarde alguns minutos.';
  if (c.includes('network')) return 'Sem conexão. Verifique sua internet.';
  return 'Não foi possível entrar. Detalhe: ' + (e?.code || e?.message || e);
}
async function doLogout() { await signOut(auth); }

async function loadAll() {
  S.settings = await DB.getSettings();
  S.profiles = await DB.seedProfilesIfEmpty();
  S.benefits = await DB.listBenefits();

  S.communication = await DB.getCommunication() || { imageBase64: '', active: false, id: '' };

function linkRow(l, i) {
  return `<div class="link-row" data-i="${i}" style="display:flex;gap:8px;margin-bottom:8px">

// Mutações no benefício em edição
function benefitColor(i) { syncBenefitForm(); S.editingBenefit.color = i; render(); }
function benefitProfile(pid) {
  const arr = S.editingBenefit.profileIds || [];
  S.editingBenefit.profileIds = arr.includes(pid) ? arr.filter(x => x !== pid) : [...arr, pid];
  syncBenefitForm(); render();

async function benefitIcon(input) {
  const file = input.files?.[0]; if (!file) return;
  S.editingBenefit.iconBase64 = await readFileDataURL(file);
  syncBenefitForm(); render();
}
function clearBenefitIcon() { S.editingBenefit.iconBase64 = ''; syncBenefitForm(); render(); }
async function benefitBanner(input) {
  const file = input.files?.[0]; if (!file) return;
  S.editingBenefit.bannerBase64 = await readFileDataURL(file);
  syncBenefitForm(); render();
}
function clearBenefitBanner() { S.editingBenefit.bannerBase64 = ''; syncBenefitForm(); render(); }
function addLink() {
  const c = document.getElementById('bf-links');
  const div = document.createElement('div');
  div.innerHTML = linkRow({}, Date.now());
  c.appendChild(div.firstElementChild);
}
// Lê os campos do formulário de volta para o estado (antes de re-render).
function syncBenefitForm() {
  const b = S.editingBenefit; if (!b) return;
  const g = id => document.getElementById(id);
  if (g('bf-name')) b.name = g('bf-name').value;
  if (g('bf-category')) b.category = g('bf-category').value;
  if (g('bf-order')) b.order = Number(g('bf-order').value || 0);
  if (g('bf-description')) b.description = g('bf-description').value;
  if (g('bf-details')) b.details = g('bf-details').value;
  if (g('bf-responsible')) b.responsible = g('bf-responsible').value;
  if (g('bf-icon')) b.icon = g('bf-icon').value;
  if (g('bf-startDate')) b.startDate = g('bf-startDate').value;
  if (g('bf-endDate')) b.endDate = g('bf-endDate').value;
  if (g('bf-active')) b.active = g('bf-active').checked;
  if (g('bf-featured')) b.featured = g('bf-featured').checked;
  if (g('bf-isNew')) b.isNew = g('bf-isNew').checked;
  if (g('bf-actionRequired')) b.actionRequired = g('bf-actionRequired').checked;
  const fit = document.querySelector('input[name="bf-fit"]:checked');
  if (fit) b.iconFit = fit.value;
  collectLinks();
}
function collectLinks() {
  const b = S.editingBenefit;
  const rows = [...document.querySelectorAll('#bf-links .link-row')];
  const links = rows.map(r => ({
    label: r.querySelector('.lk-label').value.trim(),
    url: r.querySelector('.lk-url').value.trim()
  })).filter(l => l.url);
  b.links = links; b.documents = [];
}
async function saveBenefit() {
  syncBenefitForm();
  const b = S.editingBenefit;
  if (!b.name.trim()) { toast('Informe o nome do benefício.'); return; }
  const savedId = await DB.saveBenefit(b);
  await DB.logAudit({ action: b.id ? 'update' : 'create', entity: 'benefit', entityId: savedId, userEmail: S.user.email, detail: b.name });
  S.editingBenefit = null;
  S.benefits = await DB.listBenefits();
  toast('Benefício salvo.');
  render();
}
async function delBenefit(bid) {
  const b = S.benefits.find(x => x.id === bid);
  if (!confirm(`Excluir o benefício “${b?.name}”? Esta ação não pode ser desfeita.`)) return;
  await DB.deleteBenefit(bid);
  await DB.logAudit({ action: 'delete', entity: 'benefit', entityId: bid, userEmail: S.user.email, detail: b?.name });
  S.benefits = await DB.listBenefits();
  toast('Benefício excluído.');
  render();
}

// Normaliza cabeçalho de coluna (sem acento, minúsculo) p/ casar nomes.
function normHeader(h) {
  return String(h || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
}
async function importFile(input) {
  const file = input.files?.[0]; if (!file) return;
  if (typeof XLSX === 'undefined') { toast('Biblioteca de leitura não carregou. Recarregue a página.'); return; }
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });
    const map = { name: ['nome', 'funcionario', 'colaborador'], cpf: ['cpf'], profile: ['perfil'],
      unit: ['unidade', 'filial'], department: ['departamento', 'setor'], role: ['cargo', 'funcao'],
      situation: ['situacao'], admissionDate: ['data de admissao', 'admissao'], registry: ['matricula'] };
    const rows = raw.map(r => {
      const keys = Object.keys(r);
      const pick = (aliases) => {
        const k = keys.find(k => aliases.includes(normHeader(k)));
        return k ? r[k] : '';
      };
      const out = {};
      for (const field in map) out[field] = pick(map[field]);
      return out;
    }).filter(r => String(r.cpf).replace(/\D/g, '').length >= 8 && String(r.name).trim());
    if (!rows.length) { toast('Nenhuma linha válida encontrada (precisa de Nome e CPF).'); return; }
    S.importPreview = { stage: 'preview', rows, fileName: file.name, summary: null };
    render();
  } catch (e) {
    toast('Erro ao ler a planilha: ' + (e.message || e));
  }
}

  const p = S.importPreview;

  const importId = 'imp_' + id();
  const summary = await DB.importEmployees(p.rows, { importId, fileName: p.fileName, userEmail: S.user.email });

  S.importPreview = { stage: 'done', summary };
  S.employees = await DB.listEmployees();
  render();
}

async function setRaffleStatus(rid, status) {
  const r = await DB.getRaffle(rid);
  if (!r) return;
  await DB.saveRaffle({ ...r, status });
  const labels = { open: 'inscrições abertas', closed: 'inscrições fechadas' };
  await DB.logAudit({ action: 'status', entity: 'raffle', entityId: rid, userEmail: S.user.email, detail: labels[status] || status });
  toast(status === 'open' ? 'Inscrições abertas!' : status === 'closed' ? 'Inscrições fechadas.' : 'Status atualizado.');
  await viewRaffle(rid);
  S.raffles = await DB.listRaffles();
}
async function draw(rid) {
  if (!confirm('Realizar o sorteio agora? Os ganhadores serão definidos. Você ainda precisará publicar o resultado depois.')) return;
  try {
    const winners = await DB.drawRaffle(rid);
    await DB.logAudit({ action: 'draw', entity: 'raffle', entityId: rid, userEmail: S.user.email, detail: `${winners.length} ganhador(es)` });
    toast(`Sorteio realizado: ${winners.length} ganhador(es).`);
    await viewRaffle(rid);
    S.raffles = await DB.listRaffles();
  } catch (e) { toast(e.message || 'Erro ao sortear.'); }
}
async function publish(rid) {
  if (!confirm('Publicar o resultado? Os funcionários passarão a ver se foram contemplados.')) return;
  await DB.publishRaffle(rid);
  await DB.logAudit({ action: 'publish', entity: 'raffle', entityId: rid, userEmail: S.user.email });

  S.raffles = await DB.listRaffles();

        : '<p class="muted" style="margin:6px 0 12px">Nenhuma arte enviada.</p>'}

      </div>
      <p class="muted" style="font-size:12.5px;margin:12px 0 0;line-height:1.5">A imagem é compactada automaticamente. Dica: arte vertical (formato story/retrato) fica melhor no celular. Cada arte nova reaparece <b>uma vez</b> para quem já tinha visto a anterior.</p>

    </div></div>`;

// Compacta a imagem no navegador (reduz tamanho p/ não inchar o banco).
function compressImage(file, maxW = 1080, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
      URL.revokeObjectURL(img.src);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}
async function commUpload(input) {
  const f = input.files?.[0]; if (!f) return;
  try {
    S.communication.imageBase64 = await compressImage(f);
    S.communication.id = 'cm_' + id(); // arte nova → reaparece uma vez
    render();
  } catch (e) { toast('Não consegui processar a imagem.'); }
}
function commRemove() {
  S.communication.imageBase64 = '';
  S.communication.active = false;
  render();
}
async function commSave() {
  const active = document.getElementById('cm-active')?.checked || false;
  const c = S.communication || {};
  const data = {
    imageBase64: c.imageBase64 || '',
    active: !!(active && c.imageBase64),
    id: c.id || (c.imageBase64 ? 'cm_' + id() : '')
  };
  await DB.saveCommunication(data);
  await DB.logAudit({ action: 'update', entity: 'communication', userEmail: S.user.email, detail: data.active ? 'ativo' : 'inativo' });
  S.communication = await DB.getCommunication() || data;
  toast(data.active ? 'Comunicado publicado!' : 'Comunicado salvo.');
  render();
}

// ============================================================================
// Exportação para Excel (usa o SheetJS já carregado na página)
// ============================================================================
function downloadSheet(rows, sheetName, fileName) {
  if (typeof XLSX === 'undefined') { toast('Biblioteca de exportação não carregou. Recarregue a página.'); return; }
  if (!rows.length) { toast('Nada para exportar.'); return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, fileName);
}
function exportEmployees() {
  const rows = S.employees.map(e => ({
    Nome: e.name || '',
    CPF: e.cpfMasked || '',
    Perfil: (e.profileIds || []).map(profileName).join(', ') || e.profileRaw || '',
    Unidade: e.unit || '',
    Departamento: e.department || '',
    Cargo: e.role || ''
  }));
  downloadSheet(rows, 'Funcionários', 'funcionarios_raguife.xlsx');
  DB.logAudit({ action: 'export', entity: 'employees', userEmail: S.user.email, detail: `${rows.length} registros` });
}
function exportWinners(rid) {
  const r = S.viewingRaffle;
  const winners = (r && r._winners) || [];
  const rows = winners.map(w => ({
    Filme: w.filmTitle || '',
    Ganhador: w.employeeName || '',
    Voucher: w.voucherCode || ''
  }));
  downloadSheet(rows, 'Ganhadores', `ganhadores_${(r?.title || 'sorteio').replace(/\s+/g, '_').toLowerCase()}.xlsx`);
  DB.logAudit({ action: 'export', entity: 'raffle_winners', entityId: rid, userEmail: S.user.email, detail: `${rows.length} ganhadores` });
}
