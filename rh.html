<script>
(function(){
  let resolveStorage;
  window.__storageReady = new Promise(resolve => { resolveStorage = resolve; });
  function localStorageAdapter(){
    const PREFIX = 'rgf_';
    return {
      type: 'local',
      async get(key){ const value = localStorage.getItem(PREFIX + key); return value == null ? null : { key, value }; },
      async set(key, value){ localStorage.setItem(PREFIX + key, value); return { key, value }; },
      async delete(key){ localStorage.removeItem(PREFIX + key); return { key, deleted: true }; },
      async list(prefix){ const keys=[]; const target=PREFIX+(prefix||''); for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && k.startsWith(target)) keys.push(k.slice(PREFIX.length)); } return { keys }; }
    };
  }
  window.__setStorage = impl => { window.storage = impl; resolveStorage(impl); };
  window.__localStorageAdapter = localStorageAdapter;
})();
</script>
<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyBgl6GSdC-BPGpMcdAUoWDMbNsM8qn5p1A",
  authDomain: "beneficios-f89ea.firebaseapp.com",
  projectId: "beneficios-f89ea",
  storageBucket: "beneficios-f89ea.firebasestorage.app",
  messagingSenderId: "722178353043",
  appId: "1:722178353043:web:29db185d0e1c8dd0416a66"
};
async function startStorage(){
  try{
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, where, getDocs } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js');
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const COLLECTION = 'raguife';
    const enc = key => encodeURIComponent(key);
    window.__setStorage({
      type: 'firebase',
      async get(key){ const snap = await getDoc(doc(db, COLLECTION, enc(key))); return snap.exists() ? { key, value: snap.data().v } : null; },
      async set(key, value){ await setDoc(doc(db, COLLECTION, enc(key)), { k:key, v:value, updatedAt:Date.now() }); return { key, value }; },
      async delete(key){ await deleteDoc(doc(db, COLLECTION, enc(key))); return { key, deleted:true }; },
      async list(prefix){ const p=prefix||''; const q=query(collection(db,COLLECTION), where('k','>=',p), where('k','<',p+'\uf8ff')); const snap=await getDocs(q); const keys=[]; snap.forEach(d=>keys.push(d.data().k)); return { keys }; }
    });
  }catch(err){
    console.warn('Firebase indisponível. Usando localStorage.', err);
    window.__setStorage(window.__localStorageAdapter());
  }
}
startStorage();
</script>

const KEY_DATA = 'raguife:data';
const KEY_METRICS = 'raguife:metrics';
const KEY_IMG_PREFIX = 'raguife:img:';
const KEY_ENTRY_PREFIX = 'raguife:rentry:';
const DAY = 86400000;
const CARD_COLORS = ['#024f2b','#739630','#0a6b3c','#557024','#1f7a4d','#666666','#2c5ca8','#b06b00'];
let state = null;
let metrics = null;
let imgCache = {};
function id(){ return Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }
function esc(v){ return String(v ?? '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }
function escAttr(v){ return esc(v).replace(/'/g,'&#39;'); }
function digits(v){ return String(v ?? '').replace(/\D/g,''); }
function cpfMask(v){ const d=digits(v).padStart(11,'0').slice(-11); return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4'); }
function cpfSafe(v){ const d=digits(v).padStart(11,'0').slice(-11); return '***.' + d.slice(3,6) + '.' + d.slice(6,9) + '-**'; }
function firstName(n){ return String(n||'').trim().split(/\s+/)[0] || 'Colaborador'; }
function normalizeText(v){ return String(v ?? '').trim(); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function nowLocalForInput(){ const d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,16); }
function dt(v){ if(!v) return ''; try{ return new Date(v).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'}); }catch(e){return v;} }
function dateOk(from,to){ const n=Date.now(); if(from && new Date(from).getTime()>n) return false; if(to && new Date(to).getTime()<n) return false; return true; }
function toast(msg){ const el=document.getElementById('toast'); if(!el){ alert(msg); return; } el.textContent=msg; el.classList.add('show'); clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>el.classList.remove('show'),2800); }
function emptyCinema(){ return { id:'cine_'+id(), title:'Sorteio do Cinema', status:'draft', openFrom:'', openTo:'', drawAt:'', films:[], results:[], published:false, createdAt:Date.now(), updatedAt:Date.now() }; }
function seed(){ const p1={id:'p_raguife',name:'Raguife'}, p2={id:'p_bd',name:'Raguife BD'}, p3={id:'p_comercial',name:'Comercial'}, p4={id:'p_aprendiz',name:'Estagiário/Aprendiz'}; return { portalUrl: location.origin + location.pathname.replace(/[^/]*$/,'index.html'), profiles:[p1,p2,p3,p4], employees:[], benefits:[{id:'b_saude',name:'Plano de Saúde',cat:'Saúde',active:true,order:1,icon:'🏥',color:0,iconFit:'contain',pitch:'Consulte as regras, rede credenciada, links úteis e orientações do plano de saúde.',steps:['Confira a operadora disponível para o seu perfil.','Acesse o link informado ou procure o RH/DP em caso de dúvida.'],links:[],docs:[],profileIds:[],createdAt:Date.now(),updatedAt:Date.now()}], featuredId:'b_saude', cinema:emptyCinema(), raffleHistory:[], updatedAt:Date.now() }; }
function emptyMetrics(){ return { logins:0, users:{}, views:{}, linkClicks:{} }; }
function normalizeState(s){ const base=seed(); s = s && typeof s==='object' ? s : base; s.portalUrl=s.portalUrl||base.portalUrl; s.profiles=Array.isArray(s.profiles)?s.profiles:base.profiles; s.employees=Array.isArray(s.employees)?s.employees:[]; s.benefits=Array.isArray(s.benefits)?s.benefits:base.benefits; s.benefits.forEach((b,i)=>{ b.id=b.id||'b_'+id(); b.name=b.name||'Benefício sem nome'; b.cat=b.cat||'Geral'; b.active=b.active!==false; b.order=Number.isFinite(Number(b.order))?Number(b.order):(i+1); b.icon=b.icon||'💸'; b.color=Number.isInteger(b.color)?b.color:(i%CARD_COLORS.length); b.iconFit=b.iconFit==='cover'?'cover':'contain'; b.pitch=b.pitch||''; b.steps=Array.isArray(b.steps)?b.steps:[]; b.links=Array.isArray(b.links)?b.links:[]; b.docs=Array.isArray(b.docs)?b.docs:[]; b.profileIds=Array.isArray(b.profileIds)?b.profileIds:[]; b.responsible=b.responsible||''; b.validFrom=b.validFrom||''; b.validTo=b.validTo||''; b.actionRequired=!!b.actionRequired; b.createdAt=b.createdAt||Date.now(); b.updatedAt=b.updatedAt||b.createdAt; }); s.featuredId=s.featuredId || (s.benefits[0]?.id || null); s.cinema=Object.assign(emptyCinema(), s.cinema||{}); s.cinema.films=Array.isArray(s.cinema.films)?s.cinema.films:[]; s.cinema.results=Array.isArray(s.cinema.results)?s.cinema.results:[]; s.raffleHistory=Array.isArray(s.raffleHistory)?s.raffleHistory:[]; return s; }
function normalizeMetrics(m){ m=m&&typeof m==='object'?m:emptyMetrics(); m.logins=Number(m.logins||0); m.users=m.users&&typeof m.users==='object'?m.users:{}; m.views=m.views&&typeof m.views==='object'?m.views:{}; m.linkClicks=m.linkClicks&&typeof m.linkClicks==='object'?m.linkClicks:{}; return m; }
async function save(){ state.updatedAt=Date.now(); await storage.set(KEY_DATA, JSON.stringify(state)); }
async function saveMetrics(){ await storage.set(KEY_METRICS, JSON.stringify(metrics)); }
async function loadCore(){ const dr=await storage.get(KEY_DATA); state=normalizeState(dr&&dr.value?JSON.parse(dr.value):seed()); const mr=await storage.get(KEY_METRICS); metrics=normalizeMetrics(mr&&mr.value?JSON.parse(mr.value):emptyMetrics()); await hydrateImages(); }
async function hydrateImages(){ imgCache={}; const ids=new Set(); (state?.benefits||[]).forEach(b=>{ if(b.iconImgId) ids.add(b.iconImgId); (b.stepImgIds||[]).forEach(x=>ids.add(x)); }); await Promise.all([...ids].map(async iid=>{ const r=await storage.get(KEY_IMG_PREFIX+iid).catch(()=>null); if(r&&r.value) imgCache[iid]=r.value; })); }
function imgUrl(iid){ return iid && imgCache[iid] ? imgCache[iid] : ''; }
async function putImage(dataURL){ const key='img_'+id(); await storage.set(KEY_IMG_PREFIX+key,dataURL); imgCache[key]=dataURL; return key; }
async function delImage(iid){ if(!iid) return; await storage.delete(KEY_IMG_PREFIX+iid).catch(()=>{}); delete imgCache[iid]; }
function readFileDataURL(file){ return new Promise((resolve,reject)=>{ const r=new FileReader(); r.onload=()=>resolve(r.result); r.onerror=reject; r.readAsDataURL(file); }); }
function profileIdsForEmployee(emp){ if(Array.isArray(emp.profileIds) && emp.profileIds.length) return emp.profileIds; const names=String(emp.profile||'').split(/[;,|]/).map(x=>x.trim().toLowerCase()).filter(Boolean); return state.profiles.filter(p=>names.includes(String(p.name).toLowerCase())).map(p=>p.id); }
function benefitForEmployee(b, emp){ if(b.active===false) return false; if(!dateOk(b.validFrom,b.validTo)) return false; if(!b.profileIds || !b.profileIds.length) return true; const eps=profileIdsForEmployee(emp); return b.profileIds.some(id=>eps.includes(id)); }
function iconHTML(b, cls='ico'){ const u=imgUrl(b.iconImgId); const fit=b.iconFit==='cover'?'cover':'contain'; return `<div class="${cls} ${fit}" style="background:${CARD_COLORS[(b.color||0)%CARD_COLORS.length]}">${u?`<img src="${escAttr(u)}" alt="" />`:esc(b.icon||'💸')}</div>`; }
function activeCinema(){ const c=state.cinema||{}; return c && c.films && c.films.length ? c : null; }
function cinemaOpen(c){ if(!c || c.published) return false; if(c.status !== 'open') return false; return dateOk(c.openFrom,c.openTo); }
async function getEntry(raffleId, cpf){ const r=await storage.get(KEY_ENTRY_PREFIX+raffleId+':'+cpf).catch(()=>null); return r&&r.value?JSON.parse(r.value):null; }
async function setEntry(raffleId, cpf, entry){ await storage.set(KEY_ENTRY_PREFIX+raffleId+':'+cpf, JSON.stringify(entry)); }
async function listEntries(raffleId){ const list=await storage.list(KEY_ENTRY_PREFIX+raffleId+':'); const out=[]; for(const k of list.keys){ const r=await storage.get(k).catch(()=>null); if(r&&r.value){ try{ out.push(JSON.parse(r.value)); }catch(e){} } } return out; }
function wonSameFilm(cpf, filmTitle, currentRaffleId){ const target=String(filmTitle||'').trim().toLowerCase(); if(!target) return false; for(const h of state.raffleHistory||[]){ if(h.id===currentRaffleId) continue; for(const r of h.results||[]){ if(digits(r.cpf)===digits(cpf) && String(r.filmTitle||'').trim().toLowerCase()===target) return true; } } return false; }
function linkIcon(url){ const u=String(url||'').toLowerCase(); if(u.includes('pdf')) return '📄'; if(u.includes('wa.me')||u.includes('whatsapp')) return '💬'; if(u.includes('youtube')) return '▶️'; return '🔗'; }

const RH_HASH='0a81af152ac4e47e749dbfebb4ccdcf668a0a47f96a2cbf2b83893e35273f805';
let authed=sessionStorage.getItem('rgf_rh_auth_v7')==='1';

async function sha256Hex(text){ const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(String(text||''))); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join(''); }
async function init(){ await window.__storageReady; await loadCore(); await save(); render(); }
async function login(){ const pass=document.getElementById('pass').value; const err=document.getElementById('err'); try{ if(await sha256Hex(pass)===RH_HASH){ authed=true; sessionStorage.setItem('rgf_rh_auth_v7','1'); render(); return; } }catch(e){} err.style.display='block'; err.textContent='Senha incorreta.'; }
function logout(){ authed=false; sessionStorage.removeItem('rgf_rh_auth_v7'); render(); }
function setTab(t){ tab=t; editingBenefit=null; draftIcon=null; render(); if(t==='share') setTimeout(makeQR,50); if(t==='cinema') refreshEntries(); }
function shell(content){ return `<div class="wrap"><header class="top"><div class="brand"><img src="${escAttr(LOGO)}" alt="Raguife"><div class="line"></div><div><b>Painel RH/DP</b><span>Gestão de benefícios e sorteios</span></div></div><span class="pill"><i></i>${storage.type==='firebase'?'Firebase ativo':'Modo local'}</span></header><section class="hero"><h1>Controle do portal do colaborador</h1><p>Cadastre benefícios, importe funcionários, crie sorteios semanais e acompanhe inscrições.</p></section><section class="layout"><aside class="side"><nav class="nav">${[['dashboard','Visão geral'],['benefits','Benefícios'],['profiles','Perfis'],['employees','Funcionários'],['cinema','Cinema'],['share','Divulgação'],['data','Dados']].map(([idv,label])=>`<button class="${tab===idv?'on':''}" onclick="setTab('${idv}')">${label}</button>`).join('')}<button class="exit" onclick="logout()">Sair do RH</button></nav></aside><main class="main">${content}</main></section></div><div class="toast" id="toast"></div>`; }
function render(){ if(!authed){ document.getElementById('root').innerHTML=`<main class="login"><img src="${escAttr(LOGO)}" alt="Raguife"><h1>Acesso RH/DP</h1><p>Entre para administrar benefícios, funcionários e sorteios.</p><label>Senha</label><input id="pass" type="password" placeholder="Senha do RH" onkeydown="if(event.key==='Enter')login()"><button class="btn full" onclick="login()">Entrar</button><div id="err" class="error"></div><p class="sub">Senha inicial: Raguife@2026. Em produção, o ideal é evoluir para Firebase Authentication com usuário individual.</p></main>`; setTimeout(()=>document.getElementById('pass')?.focus(),20); return; } const views={dashboard:dashHTML,benefits:benefitsHTML,profiles:profilesHTML,employees:employeesHTML,cinema:cinemaHTML,share:shareHTML,data:dataHTML}; document.getElementById('root').innerHTML=shell((views[tab]||dashHTML)()); }
function dashHTML(){ const active=state.benefits.filter(b=>b.active!==false).length; const users=Object.keys(metrics.users||{}).length; const c=activeCinema(); return `<section class="kpis"><div class="kpi"><b>${state.benefits.length}</b><span>benefícios cadastrados</span></div><div class="kpi"><b>${active}</b><span>benefícios ativos</span></div><div class="kpi"><b>${state.employees.length}</b><span>funcionários na base</span></div><div class="kpi"><b>${users}</b><span>CPFs que acessaram</span></div></section><section class="card"><div class="card-head"><div><h2>Próximas ações recomendadas</h2><div class="sub">O app está separado: funcionário em celular, RH em web.</div></div></div><div class="grid three"><button class="btn soft" onclick="setTab('employees')">Importar funcionários</button><button class="btn soft" onclick="setTab('benefits')">Atualizar benefícios</button><button class="btn soft" onclick="setTab('cinema')">Gerir sorteio</button></div></section><section class="card"><h2>Sorteio atual</h2><div class="sub">${c?`${esc(c.title)} · ${esc(c.status)} · ${c.films.length} filme(s)`:'Nenhum sorteio cadastrado'}</div></section>`; }
function benefitsHTML(){ const list=state.benefits.filter(b=>!benefitSearch || [b.name,b.cat,b.pitch].join(' ').toLowerCase().includes(benefitSearch.toLowerCase())).sort((a,b)=>(a.order||0)-(b.order||0)); return `<section class="card"><div class="card-head"><div><h2>Benefícios</h2><div class="sub">Cadastre o que aparece no celular do funcionário.</div></div><button class="btn" onclick="newBenefit()">Novo benefício</button></div><div class="toolbar"><input placeholder="Buscar benefício" value="${escAttr(benefitSearch)}" oninput="benefitSearch=this.value;render()"></div></section>${editingBenefit?benefitFormHTML():''}<section class="list">${list.length?list.map(benefitRow).join(''):'<div class="empty">Nenhum benefício cadastrado.</div>'}</section>`; }
function benefitRow(b){ const profs=(b.profileIds||[]).length?b.profileIds.map(pid=>state.profiles.find(p=>p.id===pid)?.name).filter(Boolean).join(', '):'Todos'; return `<div class="row ${b.active===false?'inactive':''}">${iconHTML(b)}<div><h3>${esc(b.name)}</h3><p>${esc(b.cat)} · ${esc(profs)}</p><div class="tags"><span class="tag ${b.active!==false?'ok':'bad'}">${b.active!==false?'Ativo':'Inativo'}</span><span class="tag">Ordem ${Number(b.order||0)}</span><span class="tag">${b.iconFit==='cover'?'Preencher':'Conter'}</span>${b.actionRequired?'<span class="tag warn">Ação necessária</span>':''}</div></div><div class="actions"><button class="btn sm line" onclick="editBenefit('${b.id}')">Editar</button><button class="btn sm bad" onclick="removeBenefit('${b.id}')">Excluir</button></div></div>`; }
function newBenefit(){ editingBenefit={id:'b_'+id(),name:'',cat:'Geral',active:true,order:state.benefits.length+1,icon:'💸',color:0,iconFit:'contain',pitch:'',steps:[],links:[],docs:[],profileIds:[],responsible:'',validFrom:'',validTo:'',actionRequired:false,createdAt:Date.now(),updatedAt:Date.now()}; draftIcon=null; render(); }
function editBenefit(idv){ editingBenefit=JSON.parse(JSON.stringify(state.benefits.find(b=>b.id===idv))); draftIcon=null; render(); }
function cancelBenefit(){ editingBenefit=null; draftIcon=null; render(); }
function lineRows(arrName, items){ return `<div class="linkrows" id="${arrName}">${(items||[]).map((l,i)=>`<div class="linkrow"><input placeholder="Nome" value="${escAttr(l.label||'')}" data-${arrName}-label="${i}"><input placeholder="URL" value="${escAttr(l.url||'')}" data-${arrName}-url="${i}"><button class="btn sm bad" onclick="this.closest('.linkrow').remove()">×</button></div>`).join('')}</div><button class="btn sm line" type="button" onclick="addLinkRow('${arrName}')">Adicionar</button>`; }
function benefitFormHTML(){ const b=editingBenefit; const img=draftIcon || imgUrl(b.iconImgId); return `<section class="card"><div class="card-head"><div><h2>${state.benefits.some(x=>x.id===b.id)?'Editar':'Novo'} benefício</h2><div class="sub">Use “conter” para logos retangulares/redondos e “preencher” para imagens quadradas.</div></div><button class="btn line" onclick="cancelBenefit()">Cancelar</button></div><div class="grid"><div><label>Nome</label><input id="b_name" value="${escAttr(b.name)}"></div><div><label>Categoria</label><input id="b_cat" value="${escAttr(b.cat)}"></div></div><div class="grid four"><div><label>Emoji</label><input id="b_icon" value="${escAttr(b.icon)}" maxlength="4"></div><div><label>Cor</label><select id="b_color">${CARD_COLORS.map((c,i)=>`<option value="${i}" ${Number(b.color)===i?'selected':''}>Cor ${i+1}</option>`).join('')}</select></div><div><label>Ordem</label><input id="b_order" type="number" value="${Number(b.order||0)}"></div><div><label>Status</label><select id="b_active"><option value="1" ${b.active!==false?'selected':''}>Ativo</option><option value="0" ${b.active===false?'selected':''}>Inativo</option></select></div></div><div class="grid"><div><label>Enquadramento do ícone</label><select id="b_fit" onchange="updatePreviewFit()"><option value="contain" ${b.iconFit!=='cover'?'selected':''}>Conter — mostra inteiro</option><option value="cover" ${b.iconFit==='cover'?'selected':''}>Preencher — ocupa tudo</option></select></div><div><label>Imagem do ícone</label><input type="file" accept="image/*" onchange="onIconFile(this)"><div class="preview" id="iconPrev">${img?`<img class="${b.iconFit==='cover'?'cover':''}" src="${escAttr(img)}"><button class="btn sm bad" onclick="removeIconDraft()">Remover</button>`:''}</div></div></div><label>Resumo</label><textarea id="b_pitch">${esc(b.pitch)}</textarea><div class="grid"><div><label>Responsável/contato interno</label><input id="b_resp" value="${escAttr(b.responsible)}" placeholder="Ex.: RH/DP"></div><div><label>Ação necessária?</label><select id="b_action"><option value="0" ${!b.actionRequired?'selected':''}>Não</option><option value="1" ${b.actionRequired?'selected':''}>Sim</option></select></div></div><div class="grid"><div><label>Válido de</label><input id="b_from" type="date" value="${escAttr(b.validFrom)}"></div><div><label>Válido até</label><input id="b_to" type="date" value="${escAttr(b.validTo)}"></div></div><label>Perfis liberados</label><div class="checkgrid">${state.profiles.map(p=>`<label><input type="checkbox" class="b_prof" value="${p.id}" ${(b.profileIds||[]).includes(p.id)?'checked':''}>${esc(p.name)}</label>`).join('')}<span class="sub">Nenhum marcado = todos</span></div><label>Passo a passo — um item por linha</label><textarea id="b_steps">${esc((b.steps||[]).join('\n'))}</textarea><div class="grid"><div><label>Links</label>${lineRows('links',b.links)}</div><div><label>Documentos/arquivos por URL</label>${lineRows('docs',b.docs)}</div></div><button class="btn full" onclick="saveBenefit()">Salvar benefício</button></section>`; }
function addLinkRow(idv){ const box=document.getElementById(idv); const idx=box.children.length; const div=document.createElement('div'); div.className='linkrow'; div.innerHTML=`<input placeholder="Nome" data-${idv}-label="${idx}"><input placeholder="URL" data-${idv}-url="${idx}"><button class="btn sm bad" onclick="this.closest('.linkrow').remove()">×</button>`; box.appendChild(div); }
async function onIconFile(inp){ const f=inp.files?.[0]; if(!f) return; draftIcon=await readFileDataURL(f); renderIconPreview(); }
function renderIconPreview(){ const box=document.getElementById('iconPrev'); if(!box) return; const fit=document.getElementById('b_fit')?.value==='cover'?'cover':''; const img=draftIcon || imgUrl(editingBenefit.iconImgId); box.innerHTML=img?`<img class="${fit}" src="${escAttr(img)}"><button class="btn sm bad" onclick="removeIconDraft()">Remover</button>`:''; }
function updatePreviewFit(){ renderIconPreview(); }
function removeIconDraft(){ draftIcon='__REMOVE__'; renderIconPreview(); }
function collectLinks(idv){ return [...document.querySelectorAll(`#${idv} .linkrow`)].map(row=>({label:normalizeText(row.querySelector(`[data-${idv}-label]`)?.value),url:normalizeText(row.querySelector(`[data-${idv}-url]`)?.value)})).filter(x=>x.label||x.url); }
async function saveBenefit(){ const b=editingBenefit; b.name=normalizeText(document.getElementById('b_name').value)||'Benefício sem nome'; b.cat=normalizeText(document.getElementById('b_cat').value)||'Geral'; b.icon=normalizeText(document.getElementById('b_icon').value)||'💸'; b.color=Number(document.getElementById('b_color').value)||0; b.order=Number(document.getElementById('b_order').value)||0; b.active=document.getElementById('b_active').value==='1'; b.iconFit=document.getElementById('b_fit').value==='cover'?'cover':'contain'; b.pitch=normalizeText(document.getElementById('b_pitch').value); b.responsible=normalizeText(document.getElementById('b_resp').value); b.actionRequired=document.getElementById('b_action').value==='1'; b.validFrom=document.getElementById('b_from').value; b.validTo=document.getElementById('b_to').value; b.profileIds=[...document.querySelectorAll('.b_prof:checked')].map(x=>x.value); b.steps=document.getElementById('b_steps').value.split('\n').map(normalizeText).filter(Boolean); b.links=collectLinks('links'); b.docs=collectLinks('docs'); if(draftIcon==='__REMOVE__'){ await delImage(b.iconImgId); delete b.iconImgId; } else if(draftIcon){ if(b.iconImgId) await delImage(b.iconImgId); b.iconImgId=await putImage(draftIcon); } b.updatedAt=Date.now(); const idx=state.benefits.findIndex(x=>x.id===b.id); if(idx>=0) state.benefits[idx]=b; else state.benefits.push(b); await save(); toast('Benefício salvo.'); editingBenefit=null; draftIcon=null; render(); }
async function removeBenefit(idv){ if(!confirm('Excluir benefício?')) return; const b=state.benefits.find(x=>x.id===idv); if(b?.iconImgId) await delImage(b.iconImgId); state.benefits=state.benefits.filter(x=>x.id!==idv); await save(); render(); }
function profilesHTML(){ return `<section class="card"><div class="card-head"><div><h2>Perfis</h2><div class="sub">Usados para segmentar benefícios e funcionários.</div></div></div><div class="grid"><div><label>Novo perfil</label><input id="newProfile" placeholder="Ex.: Raguife BD"></div><div style="align-self:end"><button class="btn" onclick="addProfile()">Adicionar</button></div></div></section><section class="list">${state.profiles.map(p=>`<div class="row"><div class="ico contain">👥</div><div><h3>${esc(p.name)}</h3><p>${state.employees.filter(e=>profileIdsForEmployee(e).includes(p.id)).length} funcionário(s)</p></div><div class="actions"><button class="btn sm bad" onclick="delProfile('${p.id}')">Excluir</button></div></div>`).join('')}</section>`; }
async function addProfile(){ const name=normalizeText(document.getElementById('newProfile').value); if(!name) return; state.profiles.push({id:'p_'+id(),name}); await save(); render(); }
async function delProfile(pid){ if(!confirm('Excluir perfil? Os funcionários não serão apagados.')) return; state.profiles=state.profiles.filter(p=>p.id!==pid); state.benefits.forEach(b=>b.profileIds=(b.profileIds||[]).filter(x=>x!==pid)); state.employees.forEach(e=>{ if(Array.isArray(e.profileIds)) e.profileIds=e.profileIds.filter(x=>x!==pid); }); await save(); render(); }
function employeesHTML(){ const q=employeeSearch.toLowerCase(); const list=state.employees.filter(e=>!q || [e.name,e.cpf,e.profile].join(' ').toLowerCase().includes(q)); return `<section class="card"><div class="card-head"><div><h2>Funcionários</h2><div class="sub">A importação mensal substitui todos os funcionários anteriores.</div></div></div><div class="grid"><div><label>Importar Excel/CSV</label><input type="file" accept=".xlsx,.xls,.csv" onchange="importEmployees(this)"></div><div><label>Buscar</label><input value="${escAttr(employeeSearch)}" placeholder="Nome, CPF ou perfil" oninput="employeeSearch=this.value;render()"></div></div><div class="toolbar" style="margin-top:12px"><button class="btn line" onclick="exportEmployees()">Exportar CSV</button><button class="btn bad" onclick="clearEmployees()">Limpar base</button></div></section><section class="card"><h2>${list.length} funcionário(s)</h2><table class="table"><thead><tr><th>Nome</th><th>CPF</th><th>Perfis</th></tr></thead><tbody>${list.slice(0,300).map(e=>`<tr><td>${esc(e.name)}</td><td>${cpfSafe(e.cpf)}</td><td>${esc(profileIdsForEmployee(e).map(pid=>state.profiles.find(p=>p.id===pid)?.name).filter(Boolean).join(', ') || e.profile || '')}</td></tr>`).join('')}</tbody></table>${list.length>300?'<div class="sub">Mostrando os primeiros 300 registros.</div>':''}</section>`; }
async function importEmployees(inp){ const file=inp.files?.[0]; if(!file) return; if(!confirm('A nova planilha substituirá TODOS os funcionários atuais. Continuar?')){ inp.value=''; return; } const data=await file.arrayBuffer(); const wb=XLSX.read(data,{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; const rows=XLSX.utils.sheet_to_json(ws,{defval:''}); const profByName=Object.fromEntries(state.profiles.map(p=>[p.name.toLowerCase(),p.id])); const employees=[]; for(const r of rows){ const obj=Object.fromEntries(Object.entries(r).map(([k,v])=>[String(k).trim().toLowerCase(),v])); const name=normalizeText(obj.nome||obj.name||obj.funcionário||obj.funcionario||obj.colaborador); const cpf=digits(obj.cpf||obj.documento||obj['cpf funcionário']||obj['cpf funcionario']); const perfil=normalizeText(obj.perfil||obj.profile||obj.perfis||obj.unidade||''); if(!name || cpf.length!==11) continue; const profileIds=perfil.split(/[;,|]/).map(x=>profByName[x.trim().toLowerCase()]).filter(Boolean); employees.push({name,cpf,profile:perfil,profileIds}); }
 state.employees=employees; state.lastImport={at:Date.now(),file:file.name,total:employees.length}; await save(); toast(`${employees.length} funcionário(s) importados.`); render(); }
function exportEmployees(){ const rows=[['Nome','CPF','Perfil']].concat(state.employees.map(e=>[e.name,cpfMask(e.cpf),profileIdsForEmployee(e).map(pid=>state.profiles.find(p=>p.id===pid)?.name).filter(Boolean).join('; ')||e.profile||''])); downloadText('funcionarios.csv', rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(';')).join('\n')); }
async function clearEmployees(){ if(!confirm('Limpar todos os funcionários?')) return; state.employees=[]; await save(); render(); }
function cinemaHTML(){ const c=state.cinema||emptyCinema(); return `<section class="card"><div class="card-head"><div><h2>Sorteio do Cinema</h2><div class="sub">O funcionário precisa acessar e clicar em “Quero participar”.</div></div><button class="btn line" onclick="newRaffle()">Novo sorteio</button></div><div class="grid"><div><label>Título</label><input id="c_title" value="${escAttr(c.title||'Sorteio do Cinema')}"></div><div><label>Status</label><select id="c_status"><option value="draft" ${c.status==='draft'?'selected':''}>Rascunho</option><option value="open" ${c.status==='open'?'selected':''}>Inscrições abertas</option><option value="closed" ${c.status==='closed'?'selected':''}>Encerrado</option><option value="published" ${c.status==='published'?'selected':''}>Resultado publicado</option></select></div></div><div class="grid three"><div><label>Abertura</label><input id="c_open" type="datetime-local" value="${escAttr(c.openFrom||'')}"></div><div><label>Encerramento</label><input id="c_close" type="datetime-local" value="${escAttr(c.openTo||'')}"></div><div><label>Data do sorteio</label><input id="c_draw" type="datetime-local" value="${escAttr(c.drawAt||'')}"></div></div><label>Filmes e ingressos</label><div id="films">${(c.films||[]).map(filmInput).join('')}</div><button class="btn sm line" onclick="addFilmInput()">Adicionar filme</button><div class="toolbar" style="margin-top:14px"><button class="btn" onclick="saveCinema()">Salvar sorteio</button><button class="btn soft" onclick="refreshEntries()">Atualizar inscritos</button><button class="btn" onclick="drawRaffle()">Realizar sorteio</button><button class="btn line" onclick="exportWinners()">Exportar ganhadores</button></div></section><section class="kpis"><div class="kpi"><b>${entries.length}</b><span>inscritos</span></div><div class="kpi"><b>${(c.results||[]).length}</b><span>contemplados</span></div><div class="kpi"><b>${(c.films||[]).reduce((a,f)=>a+Number(f.seats||0),0)}</b><span>ingressos</span></div><div class="kpi"><b>${c.published||c.status==='published'?'Sim':'Não'}</b><span>resultado publicado</span></div></section><section class="card"><h2>Inscritos</h2>${entries.length?`<table class="table"><thead><tr><th>Nome</th><th>CPF</th><th>Filme</th><th>Data</th></tr></thead><tbody>${entries.map(e=>`<tr><td>${esc(e.name)}</td><td>${cpfSafe(e.cpf)}</td><td>${esc(e.filmTitle)}</td><td>${dt(e.createdAt)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">Nenhuma inscrição carregada.</div>'}</section><section class="card"><h2>Resultado</h2>${(c.results||[]).length?`<table class="table"><thead><tr><th>Nome</th><th>CPF</th><th>Filme</th><th>Código</th></tr></thead><tbody>${c.results.map(r=>`<tr><td>${esc(r.name)}</td><td>${cpfSafe(r.cpf)}</td><td>${esc(r.filmTitle)}</td><td>${esc(r.code)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">Resultado ainda não gerado.</div>'}</section>`; }
function filmInput(f){ return `<div class="film-row"><input placeholder="Nome do filme" value="${escAttr(f.title||'')}" data-film-title="${escAttr(f.id||'f_'+id())}"><input type="number" min="1" value="${Number(f.seats||1)}" data-film-seats="${escAttr(f.id||'')}"><button class="btn sm bad" onclick="this.closest('.film-row').remove()">×</button></div>`; }
function addFilmInput(){ const fid='f_'+id(); const div=document.createElement('div'); div.className='film-row'; div.innerHTML=`<input placeholder="Nome do filme" data-film-title="${fid}"><input type="number" min="1" value="1" data-film-seats="${fid}"><button class="btn sm bad" onclick="this.closest('.film-row').remove()">×</button>`; document.getElementById('films').appendChild(div); }
async function saveCinema(){ const films=[...document.querySelectorAll('#films .film-row')].map(row=>{ const title=normalizeText(row.querySelector('[data-film-title]').value); const idv=row.querySelector('[data-film-title]').dataset.filmTitle || 'f_'+id(); const seats=Number(row.querySelector('[data-film-seats]').value)||1; return title?{id:idv,title,seats}:null; }).filter(Boolean); state.cinema=Object.assign(state.cinema||emptyCinema(),{title:normalizeText(document.getElementById('c_title').value)||'Sorteio do Cinema',status:document.getElementById('c_status').value,openFrom:document.getElementById('c_open').value,openTo:document.getElementById('c_close').value,drawAt:document.getElementById('c_draw').value,films,updatedAt:Date.now()}); state.cinema.published=state.cinema.status==='published'; await save(); toast('Sorteio salvo.'); await refreshEntries(); }
async function newRaffle(){ if(!confirm('Criar novo sorteio? O resultado atual ficará no histórico se já tiver sido publicado.')) return; state.cinema=emptyCinema(); entries=[]; await save(); render(); }
async function refreshEntries(){ entries=state.cinema?.id ? await listEntries(state.cinema.id) : []; render(); }
function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]); }
async function drawRaffle(){ await saveCinema(); const c=state.cinema; entries=await listEntries(c.id); if(!entries.length){ alert('Nenhum inscrito.'); return; } const results=[]; for(const film of c.films){ const eligible=entries.filter(e=>e.filmId===film.id && !wonSameFilm(e.cpf, film.title, c.id)); for(const e of shuffle(eligible).slice(0,Number(film.seats||0))){ results.push({cpf:e.cpf,name:e.name,filmId:film.id,filmTitle:film.title,code:'CINE-'+Math.random().toString(36).slice(2,8).toUpperCase(),drawnAt:Date.now()}); } } c.results=results; c.status='published'; c.published=true; const hist={id:c.id,title:c.title,at:Date.now(),results}; state.raffleHistory=(state.raffleHistory||[]).filter(h=>h.id!==c.id).concat(hist); await save(); toast('Sorteio realizado e publicado.'); render(); }
function exportWinners(){ const c=state.cinema; const rows=[['Nome','CPF','Filme','Codigo']].concat((c.results||[]).map(r=>[r.name,cpfMask(r.cpf),r.filmTitle,r.code])); downloadText('ganhadores-cinema.csv', rows.map(r=>r.map(x=>'"'+String(x).replace(/"/g,'""')+'"').join(';')).join('\n')); }
function shareHTML(){ return `<section class="card"><div class="card-head"><div><h2>Divulgação</h2><div class="sub">Use este link/QR Code para o funcionário. O RH acessa pelo arquivo rh.html.</div></div></div><label>URL do portal do funcionário</label><input id="portalUrl" value="${escAttr(state.portalUrl||location.href.replace(/rh\.html.*$/,'index.html'))}"><button class="btn full" onclick="savePortalUrl()">Salvar URL</button><div class="qrbox" style="margin-top:16px"><div class="qr" id="qrcode"></div><div><h2>QR Code</h2><p class="sub">Coloque no mural, refeitório e WhatsApp.</p><button class="btn line" onclick="makeQR()">Atualizar QR</button></div></div></section>`; }
async function savePortalUrl(){ state.portalUrl=normalizeText(document.getElementById('portalUrl').value); await save(); makeQR(); toast('URL salva.'); }
function makeQR(){ const el=document.getElementById('qrcode'); if(!el || typeof QRCode==='undefined') return; el.innerHTML=''; new QRCode(el,{text:state.portalUrl||location.href.replace(/rh\.html.*$/,'index.html'),width:190,height:190}); }
function dataHTML(){ return `<section class="card"><h2>Backup e restauração</h2><p class="sub">Exporta as configurações principais. As inscrições ficam em registros separados no Firebase.</p><div class="toolbar"><button class="btn" onclick="backup()">Baixar backup JSON</button><label class="btn line" style="margin:0">Restaurar JSON<input type="file" accept="application/json" style="display:none" onchange="restoreBackup(this)"></label></div></section>`; }
function backup(){ downloadText('backup-portal-beneficios.json', JSON.stringify(state,null,2)); }
async function restoreBackup(inp){ const f=inp.files?.[0]; if(!f) return; if(!confirm('Restaurar backup e substituir dados principais?')) return; state=normalizeState(JSON.parse(await f.text())); await save(); render(); }
function downloadText(name,text){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
init().catch(e=>{ console.error(e); document.getElementById('root').innerHTML='<main class="login"><h1>Erro ao carregar</h1><p>Verifique o Firebase/Internet.</p></main>'; });
</script>
