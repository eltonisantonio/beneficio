<html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raguife · RH / DP</title><meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ===========================================================================
   base.css — design tokens compartilhados (Funcionário + RH)
   Identidade Raguife: verde profundo + acento oliva, tipografia Bricolage/Inter.
   =========================================================================== */
:root{
  --bg:#eef5ec; --surface:#fff; --ink:#14241a; --muted:#647267; --line:#dce7db;
  --primary:#024f2b; --primary2:#0a6b3c; --soft:#e4f1e8;
  --accent:#739630; --accentSoft:#eef4e1;
  --bad:#c23a45; --badSoft:#fbeaeb; --warn:#b06b00; --warnSoft:#fff3d8;
  --ok:#1f7a4d; --okSoft:#e4f1e8;
  --shadow:0 12px 34px rgba(2,79,43,.10);
  --radius:16px;
  --display:'Bricolage Grotesque',system-ui,sans-serif;
  --body:Inter,system-ui,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{font-family:var(--body);color:var(--ink);-webkit-font-smoothing:antialiased}

/* Toast — usado nas duas áreas */
.toast{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(20px);
  background:#14241a;color:#fff;border-radius:999px;padding:11px 15px;
  font-size:13px;font-weight:800;opacity:0;pointer-events:none;transition:.2s;z-index:60;
  box-shadow:0 10px 30px rgba(0,0,0,.25)
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important}
}

/* ===========================================================================
   rh.css — área RH/DP (desktop-first). Mesma identidade verde, layout amplo
   com menu lateral, tabelas e formulários. Tokens em base.css.
   =========================================================================== */
body{background:#f4f7f3}

/* --- Login RH --- */
.rh-login{min-height:100vh;display:grid;place-items:center;padding:24px;
  background:linear-gradient(135deg,#f6faf4,#e7f0e5)}
.rh-login-card{background:#fff;border:1px solid var(--line);border-radius:24px;
  box-shadow:var(--shadow);padding:32px;width:min(400px,100%);text-align:center}
.rh-login-card img{width:150px;margin:0 auto 18px;display:block;filter:none}
.rh-login-card h1{font-family:var(--display);color:var(--primary);font-size:24px;margin:0 0 4px}
.rh-login-card p{color:var(--muted);font-size:14px;margin:0 0 20px}
.rh-login-card .field{margin-bottom:10px;text-align:left}

/* --- Shell desktop --- */
.rh-shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.rh-side{background:linear-gradient(180deg,var(--primary),#013a20);color:#fff;
  padding:20px 14px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
.rh-side .logo{display:flex;align-items:center;gap:10px;margin:4px 6px 18px}
.rh-side .logo img{width:104px;filter:brightness(0) invert(1)}
.rh-side nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow:auto}
.rh-side nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  background:transparent;border:0;color:rgba(255,255,255,.82);font:inherit;font-weight:700;
  font-size:14px;padding:11px 12px;border-radius:12px;cursor:pointer}
.rh-side nav button:hover{background:rgba(255,255,255,.08);color:#fff}
.rh-side nav button.active{background:rgba(255,255,255,.16);color:#fff}
.rh-side nav button .ic{width:20px;text-align:center}
.rh-side .who{font-size:12px;color:rgba(255,255,255,.7);padding:10px 8px;border-top:1px solid rgba(255,255,255,.15)}
.rh-side .who b{display:block;color:#fff;font-size:13px;margin-bottom:2px;word-break:break-all}
.rh-side .who button{margin-top:8px;width:100%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#fff;border-radius:10px;padding:8px;font-weight:800;font-size:12px;cursor:pointer}

.rh-main{padding:28px 32px;max-width:1180px}
.rh-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;gap:16px;flex-wrap:wrap}
.rh-head h1{font-family:var(--display);font-size:28px;color:var(--ink);margin:0}
.rh-head p{color:var(--muted);margin:4px 0 0;font-size:14px}

/* --- Componentes --- */
.field{width:100%;border:1px solid var(--line);background:#fff;border-radius:12px;
  padding:11px 13px;font:inherit;outline:none}
.field:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--soft)}
label.lbl{display:block;font-size:12px;font-weight:800;color:var(--muted);margin:0 0 5px;text-transform:uppercase;letter-spacing:.03em}
.btn{border:0;background:var(--primary);color:#fff;border-radius:12px;padding:11px 18px;
  font:inherit;font-weight:800;cursor:pointer}
.btn:hover{background:var(--primary2)}
.btn:disabled{opacity:.55;cursor:default}
.btn.secondary{background:var(--soft);color:var(--primary)}
.btn.line{background:#fff;color:var(--primary);border:1px solid var(--line)}
.btn.danger{background:var(--badSoft);color:var(--bad)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:10px}
.error{display:none;background:var(--badSoft);color:var(--bad);border-radius:10px;padding:10px;margin-top:10px;font-size:13px;font-weight:700;text-align:left}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px}
.kpi b{display:block;font-family:var(--display);font-size:34px;color:var(--primary);line-height:1}
.kpi span{font-size:13px;color:var(--muted);font-weight:700}

.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:0;overflow:hidden;margin-bottom:22px}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line);gap:12px;flex-wrap:wrap}
.panel-head h2{font-family:var(--display);font-size:18px;margin:0;color:var(--ink)}
.panel-body{padding:18px}

table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);
  padding:11px 14px;border-bottom:1px solid var(--line);font-weight:800}
td{padding:12px 14px;border-bottom:1px solid #eef3ec;vertical-align:middle}
tr:last-child td{border-bottom:0}
tr:hover td{background:#fafcf9}
.tag{display:inline-flex;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:800;text-transform:uppercase}
.tag.on{background:var(--okSoft);color:var(--ok)}
.tag.off{background:#f0f0f0;color:#888}
.tag.warn{background:var(--warnSoft);color:var(--warn)}
.tag.draft{background:#f0f0f0;color:#888}
.tag.open{background:var(--okSoft);color:var(--ok)}
.tag.closed{background:var(--warnSoft);color:var(--warn)}
.tag.drawn{background:#e6eefb;color:#2c5ca8}
.tag.published{background:var(--soft);color:var(--primary)}
.muted{color:var(--muted)}
.empty{padding:30px;text-align:center;color:var(--muted);font-size:14px}
.row-actions{display:flex;gap:6px;justify-content:flex-end}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.form-grid textarea.field{min-height:80px;resize:vertical;font-family:var(--body)}
.check{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.check input{width:17px;height:17px;accent-color:var(--primary)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;
  padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;user-select:none}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(8,20,12,.45);display:grid;place-items:center;padding:20px;z-index:50}
.modal{background:#fff;border-radius:20px;width:min(720px,100%);max-height:90vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
.modal-head h2{font-family:var(--display);font-size:20px;margin:0}
.modal-head button.x{background:transparent;border:0;font-size:22px;cursor:pointer;color:var(--muted)}
.modal-body{padding:20px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--line);position:sticky;bottom:0;background:#fff}

.icon-box{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;overflow:hidden;color:#fff;font-size:26px}
.icon-box.contain{padding:5px;background:#fff!important;border:1px solid var(--line)}
.icon-box.contain img{max-width:100%;max-height:100%;object-fit:contain}
.icon-box.cover img{width:100%;height:100%;object-fit:cover}

.hint{font-size:13px;color:var(--muted);background:var(--soft);border-radius:12px;padding:12px 14px;margin-bottom:16px;line-height:1.5}
.dropzone{border:2px dashed var(--line);border-radius:14px;padding:26px;text-align:center;color:var(--muted);cursor:pointer}
.dropzone:hover{border-color:var(--primary);background:#fafcf9}

@media (max-width:860px){
  .rh-shell{grid-template-columns:1fr}
  .rh-side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center}
  .rh-side nav{flex-direction:row;flex-wrap:wrap}
  .rh-main{padding:20px 16px}
  .form-grid{grid-template-columns:1fr}
}

</style></head><body>

// --- Identificadores e escape de HTML ---------------------------------------
function id() {
  return Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
}
function esc(v) {
  return String(v ?? '').replace(/[&<>"]/g, s => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[s]
  ));
}
function escAttr(v) {
  return esc(v).replace(/'/g, '&#39;');
}

// --- CPF ---------------------------------------------------------------------
// digits: extrai só os números. normalizeCpf: 11 dígitos com zeros à esquerda.
function digits(v) { return String(v ?? '').replace(/\D/g, ''); }
function normalizeCpf(v) { return digits(v).padStart(11, '0').slice(-11); }

// Máscara COMPLETA (uso interno/admin): 000.000.000-00
function cpfMaskFull(v) {
  return normalizeCpf(v).replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}
// Máscara SEGURA (exibida ao funcionário e no admin): ***.456.789-**
function cpfSafe(v) {
  const d = normalizeCpf(v);
  return '***.' + d.slice(3, 6) + '.' + d.slice(6, 9) + '-**';
}
function isValidCpfLength(v) { return digits(v).length === 11; }

// Hash SHA-256 do CPF normalizado → usado como ID do documento do funcionário.
// O CPF aberto NUNCA é gravado no banco; guardamos apenas o hash + a máscara.
async function cpfHash(v) {
  const norm = normalizeCpf(v);
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('rgf:' + norm));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

// --- Nomes -------------------------------------------------------------------
function firstName(n) {
  return String(n || '').trim().split(/\s+/)[0] || 'Colaborador';
}

// --- Datas -------------------------------------------------------------------
function nowLocalForInput() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}
function dt(v) {
  if (!v) return '';
  try { return new Date(v).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' }); }
  catch { return String(v); }
}
function dateShort(v) {
  if (!v) return '';
  try { return new Date(v).toLocaleDateString('pt-BR'); } catch { return String(v); }
}
// Verifica se a data atual está dentro do intervalo [from, to] (ambos opcionais).
function dateOk(from, to) {
  const n = Date.now();
  if (from && new Date(from).getTime() > n) return false;
  if (to && new Date(to).getTime() < n) return false;
  return true;
}

// --- Voucher -----------------------------------------------------------------
function voucherCode() {
  const s = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let out = '';
  for (let i = 0; i < 8; i++) out += s[Math.floor(Math.random() * s.length)];
  return out.slice(0, 4) + '-' + out.slice(4);
}

// --- Toast (notificação rápida) ----------------------------------------------
function toast(msg) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// --- Leitura de arquivo como Data URL (para logos/ícones em Base64) ----------
function readFileDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

const CARD_COLORS = [
  '#024f2b', '#739630', '#0a6b3c', '#557024',
  '#1f7a4d', '#666666', '#2c5ca8', '#b06b00'
];


const DB = (function(){
// ============================================================================
// db.js — Camada de dados. Toda leitura/escrita no Firestore passa por aqui.
// Coleções (as "gavetas etiquetadas"):
//   settings · profiles · benefits · employees · raffles
//   raffle_entries · raffle_winners · imports · audit_logs
//
// Decisões de privacidade (LGPD):
//   - O CPF aberto NUNCA é gravado. O ID do documento do funcionário é o
//     hash SHA-256 do CPF. Guardamos apenas cpfMasked + cpfHash(=id).
//   - O funcionário só consegue LER o próprio documento (getDoc por id = hash);
//     não consegue listar/enumerar a coleção. Quem manda nisso são as regras
//     do Firestore (ver firestore.rules), não só o código.
// ============================================================================




const col = name => collection(db, name);
const ref = (name, docId) => doc(db, name, docId);

// ----------------------------------------------------------------------------
// SETTINGS (documento único: settings/main)
// ----------------------------------------------------------------------------
const DEFAULT_SETTINGS = {
  portalName: 'Portal de Benefícios',
  companyName: 'Raguife',
  privacyText: 'Utilizamos seu CPF apenas para identificar seu cadastro e exibir os ' +
    'benefícios disponíveis conforme seu perfil. Seus dados não serão exibidos ' +
    'publicamente. Em caso de dúvidas, procure o RH/DP.',
  theme: 'green'
};

async function getSettings() {
  const snap = await getDoc(ref('settings', 'main')).catch(() => null);
  return Object.assign({}, DEFAULT_SETTINGS, snap && snap.exists() ? snap.data() : {});
}
async function saveSettings(data) {
  await setDoc(ref('settings', 'main'), { ...data, updatedAt: Date.now() }, { merge: true });
}

// ----------------------------------------------------------------------------
// PROFILES
// ----------------------------------------------------------------------------
const DEFAULT_PROFILES = [
  { id: 'p_raguife', name: 'Raguife' },
  { id: 'p_bd', name: 'Raguife BD' },
  { id: 'p_comercial', name: 'Comercial' },
  { id: 'p_aprendiz', name: 'Estagiário/Aprendiz' }
];

async function listProfiles() {
  const snap = await getDocs(col('profiles'));
  const out = [];
  snap.forEach(d => out.push({ id: d.id, ...d.data() }));
  return out.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
}
async function saveProfile(p) {
  const docId = p.id || ('p_' + id());
  const data = {
    name: p.name || 'Perfil',
    description: p.description || '',
    active: p.active !== false,
    updatedAt: Date.now()
  };
  if (!p.id) data.createdAt = Date.now();
  await setDoc(ref('profiles', docId), data, { merge: true });
  return docId;
}
async function deleteProfile(profileId) {
  await deleteDoc(ref('profiles', profileId));
}
// Garante que os 4 perfis padrão existam (chamado no primeiro acesso do RH).
async function seedProfilesIfEmpty() {
  const existing = await listProfiles();
  if (existing.length) return existing;
  for (const p of DEFAULT_PROFILES) {
    await setDoc(ref('profiles', p.id), {
      name: p.name, description: '', active: true, createdAt: Date.now(), updatedAt: Date.now()
    });
  }
  return listProfiles();
}

// ----------------------------------------------------------------------------
// BENEFITS
// ----------------------------------------------------------------------------
async function listBenefits() {
  const snap = await getDocs(col('benefits'));
  const out = [];
  snap.forEach(d => out.push(normalizeBenefit({ id: d.id, ...d.data() })));
  return out.sort((a, b) => (a.order || 0) - (b.order || 0) || a.name.localeCompare(b.name));
}
function normalizeBenefit(b) {
  return {
    id: b.id,
    name: b.name || 'Benefício sem nome',
    category: b.category || 'Geral',
    description: b.description || '',
    details: b.details || '',
    iconBase64: b.iconBase64 || '',
    icon: b.icon || '💸',
    iconFit: b.iconFit === 'cover' ? 'cover' : 'contain',
    color: Number.isInteger(b.color) ? b.color : 0,
    active: b.active !== false,
    actionRequired: !!b.actionRequired,
    responsible: b.responsible || '',
    startDate: b.startDate || '',
    endDate: b.endDate || '',
    order: Number.isFinite(Number(b.order)) ? Number(b.order) : 0,
    profileIds: Array.isArray(b.profileIds) ? b.profileIds : [],

// Mapeia o texto da coluna "Perfil" da planilha para ids de perfis cadastrados.
function resolveProfileIds(profileText, profiles) {
  const names = String(profileText || '')
    .split(/[;,|/]/).map(x => x.trim().toLowerCase()).filter(Boolean);
  return profiles
    .filter(p => names.includes(String(p.name).toLowerCase()))
    .map(p => p.id);
}

// IMPORTAÇÃO: a nova planilha SUBSTITUI completamente a base anterior.
// rows: [{ name, cpf, profile, unit?, department?, role?, ... }]
// Retorna o resumo (totais) para exibir e gravar no histórico.
async function importEmployees(rows, meta = {}) {
  const profiles = await listProfiles();
  const existing = await listEmployees();
  const existingIds = new Set(existing.map(e => e.id));

  // Monta os novos documentos.
  const newDocs = [];
  const newIds = new Set();
  const totalsByProfile = {};
  let withoutProfile = 0;

  for (const r of rows) {
    const cpf = normalizeCpf(r.cpf);
    if (cpf.length !== 11) continue;
    const h = await cpfHash(cpf);
    if (newIds.has(h)) continue; // evita CPF duplicado na própria planilha
    newIds.add(h);

    const profileIds = resolveProfileIds(r.profile, profiles);
    if (!profileIds.length) withoutProfile++;
    profileIds.forEach(pid => { totalsByProfile[pid] = (totalsByProfile[pid] || 0) + 1; });

    newDocs.push({
      id: h,
      data: {
        name: String(r.name || '').trim(),
        firstName: firstName(r.name),
        cpfMasked: cpfSafe(cpf),
        profileIds,
        profileRaw: String(r.profile || '').trim(),
        unit: String(r.unit || '').trim(),
        department: String(r.department || '').trim(),
        role: String(r.role || '').trim(),
        situation: String(r.situation || '').trim(),
        admissionDate: String(r.admissionDate || '').trim(),
        registry: String(r.registry || '').trim(),
        wonFilms: [],          // títulos de filmes já ganhos (trava do sorteio)
        status: 'active',
        importId: meta.importId || '',
        updatedAt: Date.now()
      }
    });
  }

  // IDs a remover = existentes que não estão na nova planilha.
  const toRemove = [...existingIds].filter(x => !newIds.has(x));

  // Executa em lotes (limite do Firestore: 500 operações por batch).
  const ops = [];
  toRemove.forEach(rid => ops.push({ type: 'del', id: rid }));
  newDocs.forEach(nd => ops.push({ type: 'set', id: nd.id, data: nd.data }));

  for (let i = 0; i < ops.length; i += 450) {
    const batch = writeBatch(db);
    for (const op of ops.slice(i, i + 450)) {
      if (op.type === 'del') batch.delete(ref('employees', op.id));
      else batch.set(ref('employees', op.id), op.data);
    }
    await batch.commit();
  }

  const summary = {
    fileName: meta.fileName || '',
    totalEmployees: newDocs.length,
    totalAdded: newDocs.filter(nd => !existingIds.has(nd.id)).length,
    totalRemoved: toRemove.length,
    totalsByProfile,
    withoutProfile,
    createdAt: Date.now(),
    createdBy: meta.userEmail || ''
  };
  return summary;
}

// MOTOR DO SORTEIO (somente RH).
// Regras aplicadas:
//   - só concorre quem se inscreveu (clicou "Quero participar");
//   - ninguém ganha o mesmo TÍTULO de filme que já ganhou (agora ou no histórico);
//   - cada pessoa ganha no máximo 1 prêmio por sorteio.
async function drawRaffle(raffleId) {
  const raffle = await getRaffle(raffleId);
  if (!raffle) throw new Error('Sorteio não encontrado.');
  if (!raffle.films || !raffle.films.length) throw new Error('Cadastre ao menos um filme.');

  const entries = await listEntries(raffleId);
  const history = await listAllWinners();

  // Conjunto "cpfHash::tituloMinusculo" de filmes já ganhos no histórico.
  const wonBefore = new Set(
    history.map(w => `${w.cpfHash}::${String(w.filmTitle || '').trim().toLowerCase()}`)
  );

  const selectedThisRaffle = new Set(); // ninguém ganha 2x no mesmo sorteio
  const winners = [];

  for (const film of raffle.films) {
    if (film.active === false) continue;
    const titleKey = String(film.title || '').trim().toLowerCase();
    let pool = entries.filter(e =>
      e.filmId === film.id &&
      !selectedThisRaffle.has(e.cpfHash) &&
      !wonBefore.has(`${e.cpfHash}::${titleKey}`)
    );
    // Embaralha (Fisher–Yates) e escolhe a quantidade de ingressos.
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const picked = pool.slice(0, Math.max(0, Number(film.quantity || 0)));
    for (const e of picked) {
      selectedThisRaffle.add(e.cpfHash);
      winners.push({
        raffleId,
        filmId: film.id,
        filmTitle: film.title,
        cpfHash: e.cpfHash,
        employeeName: e.employeeName || '',
        voucherCode: voucherCode(),
        createdAt: Date.now()
      });
    }
  }

  // Grava ganhadores + atualiza wonFilms no doc do funcionário (em lotes).
  for (let i = 0; i < winners.length; i += 200) {
    const batch = writeBatch(db);
    for (const w of winners.slice(i, i + 200)) {
      batch.set(ref('raffle_winners', entryId(raffleId, w.cpfHash)), w);
      batch.update(ref('employees', w.cpfHash), {
        wonFilms: arrayUnionTitle(w.filmTitle)
      });
    }
    await batch.commit();
  }

  await updateDoc(ref('raffles', raffleId), {
    status: 'drawn', drawAt: Date.now(), updatedAt: Date.now()
  });
  return winners;
}

  if (c.includes('invalid-credential') || c.includes('wrong-password') || c.includes('user-not-found'))

  if (c.includes('too-many-requests')) return 'Muitas tentativas. Aguarde alguns minutos.';

  return 'Não foi possível entrar. Detalhe: ' + (e?.code || e?.message || e);

// Normaliza cabeçalho de coluna (sem acento, minúsculo) p/ casar nomes.
function normHeader(h) {
  return String(h || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
}
async function importFile(input) {
  const file = input.files?.[0]; if (!file) return;
  if (typeof XLSX === 'undefined') { toast('Biblioteca de leitura não carregou. Recarregue a página.'); return; }
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });
    const map = { name: ['nome', 'funcionario', 'colaborador'], cpf: ['cpf'], profile: ['perfil'],
      unit: ['unidade', 'filial'], department: ['departamento', 'setor'], role: ['cargo', 'funcao'],
      situation: ['situacao'], admissionDate: ['data de admissao', 'admissao'], registry: ['matricula'] };
    const rows = raw.map(r => {
      const keys = Object.keys(r);
      const pick = (aliases) => {
        const k = keys.find(k => aliases.includes(normHeader(k)));
        return k ? r[k] : '';
      };
      const out = {};
      for (const field in map) out[field] = pick(map[field]);
      return out;
    }).filter(r => String(r.cpf).replace(/\D/g, '').length >= 8 && String(r.name).trim());
    if (!rows.length) { toast('Nenhuma linha válida encontrada (precisa de Nome e CPF).'); return; }
    S.importPreview = { stage: 'preview', rows, fileName: file.name, summary: null };
    render();
  } catch (e) {
    toast('Erro ao ler a planilha: ' + (e.message || e));
  }
}
async function confirmImport() {
  const p = S.importPreview;
  const btn = document.getElementById('imp-confirm');
  if (btn) { btn.disabled = true; btn.textContent = 'Importando…'; }
  const importId = 'imp_' + id();
  const summary = await DB.importEmployees(p.rows, { importId, fileName: p.fileName, userEmail: S.user.email });
  await DB.saveImportRecord(summary);
  await DB.logAudit({ action: 'import', entity: 'employees', entityId: importId, userEmail: S.user.email,
    detail: `${summary.totalEmployees} na base, +${summary.totalAdded}/-${summary.totalRemoved}` });
  S.importPreview = { stage: 'done', summary };
  S.employees = await DB.listEmployees();
  render();
}

  r.startAt = document.getElementById('rf-startAt').value;
  r.endAt = document.getElementById('rf-endAt').value;
  r.status = document.getElementById('rf-status').value;
  r.films = [...document.querySelectorAll('#rf-films .film-row')].map(row => ({
    id: row.dataset.id || 'flm_' + id(),
    title: row.querySelector('.fr-title').value.trim(),
    quantity: Number(row.querySelector('.fr-qty').value || 0),
    active: true
  })).filter(f => f.title);
}
async function saveRaffle() {
  readRaffleForm();
  const r = S.editingRaffle;
  if (!r.films.length) { toast('Cadastre ao menos um filme.'); return; }
  const sid = await DB.saveRaffle(r);
  await DB.logAudit({ action: r.id ? 'update' : 'create', entity: 'raffle', entityId: sid, userEmail: S.user.email, detail: r.title });
  S.editingRaffle = null;
  S.raffles = await DB.listRaffles();
  toast('Sorteio salvo.'); render();
}
async function delRaffle(rid) {
  const r = S.raffles.find(x => x.id === rid);
  if (!confirm(`Excluir o sorteio “${r?.title}”?`)) return;
  await DB.deleteRaffle(rid);
  await DB.logAudit({ action: 'delete', entity: 'raffle', entityId: rid, userEmail: S.user.email, detail: r?.title });
  S.raffles = await DB.listRaffles();
  toast('Sorteio excluído.'); render();
}

async function viewRaffle(rid) {
  S.viewingRaffle = await DB.getRaffle(rid);
  S.viewingRaffle._entries = await DB.listEntries(rid);
  S.viewingRaffle._winners = await DB.listWinners(rid);
  render();
}
function raffleDetailView() {
  const r = S.viewingRaffle;
  const entries = r._entries || [];
  const winners = r._winners || [];
  const byFilm = r.films.map(f => ({
    film: f,
    count: entries.filter(e => e.filmId === f.id).length,
    winners: winners.filter(w => w.filmId === f.id)
  }));
  const canDraw = r.status === 'open' || r.status === 'closed';
  const canPublish = r.status === 'drawn';

  const actions = `
    <button class="btn line" onclick="window.__backRaffles()">← Voltar</button>
    ${canDraw ? `<button class="btn" onclick="window.__draw('${r.id}')">🎲 Realizar sorteio</button>` : ''}
    ${canPublish ? `<button class="btn" onclick="window.__publish('${r.id}')">📣 Publicar resultado</button>` : ''}`;

  return `<div class="rh-head"><div><h1>${esc(r.title)}</h1>
    <p>${statusLabel(r.status) || ''} · ${entries.length} inscrito(s)</p></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">${actions}</div></div>
    ${statusTag(r.status)}
    <div class="cards-grid" style="margin-top:16px">
      <div class="kpi"><b>${entries.length}</b><span>inscritos</span></div>
      <div class="kpi"><b>${r.films.length}</b><span>filmes</span></div>
      <div class="kpi"><b>${r.films.reduce((s, f) => s + Number(f.quantity || 0), 0)}</b><span>ingressos</span></div>
      <div class="kpi"><b>${winners.length}</b><span>ganhadores</span></div>
    </div>
    ${byFilm.map(x => `<div class="panel"><div class="panel-head">
      <h2>${esc(x.film.title)}</h2>
      <span class="muted">${x.count} inscrito(s) · ${x.film.quantity} ingresso(s)</span></div>
      <div class="panel-body">
        ${x.winners.length ? `<table><thead><tr><th>Ganhador</th><th>Voucher</th></tr></thead><tbody>
          ${x.winners.map(w => `<tr><td>${esc(w.employeeName || '—')}</td><td><code>${esc(w.voucherCode)}</code></td></tr>`).join('')}
        </tbody></table>` : '<p class="muted" style="margin:0">Sem ganhadores ainda.</p>'}
      </div></div>`).join('')}`;
}
async function draw(rid) {
  if (!confirm('Realizar o sorteio agora? Os ganhadores serão definidos. Você ainda precisará publicar o resultado depois.')) return;
  try {
    const winners = await DB.drawRaffle(rid);
    await DB.logAudit({ action: 'draw', entity: 'raffle', entityId: rid, userEmail: S.user.email, detail: `${winners.length} ganhador(es)` });
    toast(`Sorteio realizado: ${winners.length} ganhador(es).`);
    await viewRaffle(rid);
    S.raffles = await DB.listRaffles();
  } catch (e) { toast(e.message || 'Erro ao sortear.'); }
}
async function publish(rid) {
  if (!confirm('Publicar o resultado? Os funcionários passarão a ver se foram contemplados.')) return;
  await DB.publishRaffle(rid);
  await DB.logAudit({ action: 'publish', entity: 'raffle', entityId: rid, userEmail: S.user.email });
  toast('Resultado publicado.');
  await viewRaffle(rid);
  S.raffles = await DB.listRaffles();
}

// ============================================================================
// CONFIGURAÇÕES
// ============================================================================
function settingsView() {
  return head('Configurações', 'Nome do portal, empresa e aviso de privacidade.') + `
    <div class="panel"><div class="panel-body">
      <div class="form-grid">
        <div><label class="lbl">Nome do portal</label><input class="field" id="st-portalName" value="${escAttr(S.settings?.portalName || '')}"></div>
        <div><label class="lbl">Empresa</label><input class="field" id="st-companyName" value="${escAttr(S.settings?.companyName || '')}"></div>
        <div class="full"><label class="lbl">Texto de privacidade (LGPD)</label>
          <textarea class="field" id="st-privacyText" style="min-height:90px">${esc(S.settings?.privacyText || '')}</textarea></div>
      </div>
      <div style="margin-top:16px"><button class="btn" onclick="window.__saveSettings()">Salvar configurações</button></div>
    </div></div>`;
}
async function saveSettings() {
  const data = {
    portalName: document.getElementById('st-portalName').value.trim(),
    companyName: document.getElementById('st-companyName').value.trim(),
    privacyText: document.getElementById('st-privacyText').value.trim()
  };
  await DB.saveSettings(data);
  await DB.logAudit({ action: 'update', entity: 'settings', userEmail: S.user.email });
  S.settings = await DB.getSettings();
  toast('Configurações salvas.');
}

// ============================================================================
// AUDITORIA
// ============================================================================
function auditView() {
  const rows = S.audit.map(a => `<tr>
    <td class="muted">${esc(dt(a.createdAt))}</td>
    <td><span class="tag ${a.action === 'delete' ? 'off' : 'on'}">${esc(a.action)}</span></td>
    <td>${esc(a.entity)}</td>
    <td class="muted">${esc(a.detail || '')}</td>
    <td class="muted" style="font-size:12px">${esc(a.userEmail || '')}</td>
  </tr>`).join('');
  return head('Auditoria', 'Registro das ações administrativas (últimas 100).') + `
    <div class="panel"><table>
      <thead><tr><th>Data/hora</th><th>Ação</th><th>Entidade</th><th>Detalhe</th><th>Usuário</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="5"><div class="empty">Sem registros ainda.</div></td></tr>'}</tbody></table></div>`;
}

// ============================================================================
// Após render: carrega settings na primeira vez
// ============================================================================
async function postRender() {
  if (S.user && !S.settings) { S.settings = await DB.getSettings(); }
}

// --- Handlers globais (onclick inline) --------------------------------------
Object.assign(window, {
  __login: doLogin, __logout: doLogout, __tab: goTab,
  __editBenefit: editBenefit, __closeBenefit: () => { S.editingBenefit = null; render(); },
  __saveBenefit: saveBenefit, __delBenefit: delBenefit,
  __benefitColor: benefitColor, __benefitProfile: benefitProfile,
  __benefitIcon: benefitIcon, __clearBenefitIcon: clearBenefitIcon, __addLink: addLink,
  __editProfile: editProfile, __closeProfile: () => { S.editingProfile = null; render(); },
  __saveProfile: saveProfile, __delProfile: delProfile,
  __importDialog: importDialog, __closeImport: () => { S.importPreview = null; render(); },
  __importFile: importFile, __confirmImport: confirmImport,
  __editRaffle: editRaffle, __closeRaffle: () => { S.editingRaffle = null; render(); },
  __saveRaffle: saveRaffle, __delRaffle: delRaffle, __addFilm: addFilm,
  __viewRaffle: viewRaffle, __backRaffles: () => { S.viewingRaffle = null; render(); },
  __draw: draw, __publish: publish,
  __saveSettings: saveSettings
});

</script>
